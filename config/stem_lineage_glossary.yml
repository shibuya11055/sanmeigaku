shared_results:
  default: |
    ひとつの干を複数人物が共有しています。同じ気を複数の人物で分け合うため、同時期に全員を同じ強さで現実化しようとすると競合が起きます。誰がいつその干を担うのか、年齢、同居、結婚、出産、介護などの時期で分けて確認します。
  core_priority: |
    四角内の身近な人物と四角外の人物が同じ干を共有しています。この場合は、本人の生活を直接動かす四角内の人物を優先します。祖父母・義父母・子の配偶者の縁は、時期限定、背景的影響、または距離を置いた関係として調整して読みます。
  father_spouse: |
    父と配偶者が同じ干を共有する場合、若年期は父、成人後や結婚期以降は配偶者として現れやすいです。父縁が早く薄くなると、その干が恋人・配偶者へ移り、恋愛への入り込みや父親像の投影が起きやすくなります。結婚する頃に父との心理的距離が整理されているかを確認します。
  child_mother_in_law: |
    子供と義母が同じ干を共有しています。同居や近すぎる関係で同時に現実化すると、子供か義母のどちらかに負担が寄る可能性があります。子供ができる時期、義母との同居・介護、婚家との距離を分けて確認します。
  child_shared: |
    子供と別の人物が同じ干を共有しています。子供に限らず、ひとつの干を二人が同時に分け合う形で現実化すると、どちらか一方の運や存在感が弱まりやすくなります。子供が生まれる頃に、その干を担っていた他人物との距離が変わるかを確認します。

multi_position_results:
  default: |
    同じ人物干が宿命内の複数位置に出ています。人物縁が強いだけでなく、現実・心・精神など複数の場所で同じ気を燃焼している状態です。縁が濃くなる一方、人物関係が複雑化したり、同じテーマを別の相手で繰り返すことがあります。
  mother: |
    母の干が複数位置に出ています。母縁が単純に強いだけでなく、母の干渉過多、成人後も母が関わる、家庭環境が複雑になる、母の兄弟姉妹や父の再婚相手など「母に準じる人物」が現れる可能性を確認します。
  father: |
    父の干が複数位置に出ています。父の印象が強く残る一方、父縁そのものは薄くなったり、家庭内で父の位置が揺れることがあります。父が正干でない場合は、父本人より父親像・男性像・愛情への固執として出ていないかを見ます。
  spouse: |
    配偶者の干が複数位置に出ています。結婚波乱の可能性を見ますが、ただちに離婚・再婚と断定しません。複数の異性縁、配偶者への期待の分散、夫婦関係を我慢して保つ形など、現実の関係の推移を確認します。
  child: |
    子供の干が複数位置に出ています。子供縁の強さとして扱えますが、未婚・子供なしの場合は作品、創作、教育、後進育成、表現活動として燃焼する必要があります。子供に集中しすぎると、本人の表現力が子供に吸われる形も確認します。
  siblings: |
    兄弟姉妹の干が複数位置に出ています。兄弟姉妹の影響が強く、生活、心、競争心、同格意識の複数面で関わります。成人後も続く縁か、距離を置いて精神的に残る縁かを分けて確認します。
  extended: |
    四角外の人物干が複数位置に出ています。縁はありますが、身近な人物ほど断定せず、家系背景、婚家、次世代など時期が限定される人物として読みます。四角内の人物と競合する場合は、四角内を優先します。
