match_types:
  exact:
    label: 正干
    short: 原点六親の干と宿命で採用された干が一致しています。
    detail: 縁が自然に成立しやすく、実際の人物縁としても強く出やすい型です。身近な人物なら生活や人生判断への影響を優先して確認します。四角外の人物は、身近な人物と同じ干を共有していないかも合わせて見ます。
  yin_yang:
    label: 陰陽
    short: 原点六親の干そのものではなく、同じ五行の陰陽違いで成立しています。
    detail: 縁はありますが、自然な親しさだけでなく距離感、違和感、役割のずれが出やすい型です。悪い意味に固定せず、その人物が本人にどのような学びや緊張を与えているかを確認します。
  place:
    label: 場所
    short: 正干・陰陽干が宿命にないため、人物に対応する場所の干で仮に成立しています。
    detail: その人物そのものの縁は薄めに読みます。ただし、親なら親、配偶者なら配偶者、子供なら子供という役割は意識されます。実際の関係は、同居や責任など場所としての現実が満たされているかを確認します。
  other:
    label: 異干
    short: 原点六親の正干・陰陽干ではない干で成立しています。
    detail: 前段の人物から連動して決まる父・祖父母・義父母などで出やすい型です。原点通りの縁ではなく、家系や夫婦関係の連動として読み、どの人物を基準に導かれた干なのかを確認します。
  missing:
    label: 不在
    short: 宿命内に該当する干がなく、場所による補充も行わない人物です。
    detail: 縁が薄い、または現実に縁があっても本人への影響が小さい人物として扱います。存在しないという意味ではなく、鑑定では影響度の低さや距離感として確認します。

resolve_types:
  exact:
    label: 探索干を採用
    detail: 六親法の手順で探す基準干が宿命内にあるため、その干を宿命六親として採用しています。
  yin_yang:
    label: 陰陽干を採用
    detail: 基準干そのものは宿命内にありませんが、同じ五行の陰陽違いがあるため、その干を宿命六親として採用しています。
  place:
    label: 場所の干を採用
    detail: 基準干も陰陽干も宿命内にないため、人物に対応する場所の干を仮に採用しています。
  missing:
    label: 該当干なし
    detail: 基準干も陰陽干も宿命内になく、この人物は場所による補充対象でもないため不在として扱います。

roles:
  mother:
    label: 母
    priority: core
    place: 年支
    focus: 母は現実に触れ合う親として年支を本来の場所に持ちます。保護、入力、生活の世話、親から受け取る現実感を見ます。
    reading: 正干なら自然な母子縁、陰陽なら縁はあるが距離感や違和感を伴いやすい母、場所なら母縁は薄めに読みます。天干にある場合は精神的影響や干渉、地支にある場合は同居・生活上の関わりを確認します。
    questions:
      - 母が生活面でどの程度近くにいたか
      - 母の保護や干渉が本人の自立にどう影響したか
      - 成人後に母との距離感が変わったか
  father:
    label: 父
    priority: core
    place: 年干
    focus: 父は母の干から連動して決まり、年干という精神的な場所を本来の場所に持ちます。理想像、権威、父親像への好き嫌いを見ます。
    reading: 父は母の成立状態に強く左右されます。正干的に成立する場合は父親像が強く、陰陽や場所の場合は距離、理想化、幻滅、父の存在感の揺れとして確認します。
    questions:
      - 父が理想化または反発の対象になっているか
      - 母との関係が父縁に影響しているか
      - 父との距離が結婚観や仕事観に影響しているか
  m_grandmother:
    label: 母方祖母
    priority: extended
    place: 母の母
    focus: 母方祖母は母を生じる流れとして、母系の保護、家系の入力、母の背景を見ます。
    reading: 正干なら母方の家系や祖母からの影響を拾います。陰陽なら距離や違和感を伴う縁、不在なら影響は小さめに見ます。母と同じ干や身近な人物と共有している場合は、母系の影響が別人物に移っていないかを確認します。
    questions:
      - 母方祖母や母方家系から受けた影響があるか
      - 母の性格や育ちに母方家系の影響が見えるか
      - 母方との距離が本人の安心感に関係しているか
  m_grandfather:
    label: 母方祖父
    priority: extended
    place: 母の父
    focus: 母方祖父は母方祖母の干合相手として、母系における男性像、家系の結びつき、母方の現実的支えを見ます。
    reading: 母方祖母が不在なら祖父も不在として扱います。成立する場合は母方家系の男性的な影響や、母の背景にある夫婦関係を補助的に確認します。
    questions:
      - 母方祖父や母方男性親族との関わりがあるか
      - 母方家系の夫婦関係が本人の家庭観に影響しているか
      - 母方祖父の存在が母への印象に影響しているか
  f_grandmother:
    label: 父方祖母
    priority: extended
    place: 父の母
    focus: 父方祖母は父を生じる流れとして、父系の保護、父の背景、父方家系の入力を見ます。
    reading: 正干なら父方家系の影響を拾います。陰陽なら距離や違和感を伴う縁、不在なら影響は小さめに見ます。父が薄い場合でも、父方祖母の干が強く出ると父方家系の影響だけが残ることがあります。
    questions:
      - 父方祖母や父方家系からの影響があるか
      - 父の性格や人生に父方家系の影響が見えるか
      - 父方との縁が本人の社会観や責任感に関係しているか
  f_grandfather:
    label: 父方祖父
    priority: extended
    place: 父の父
    focus: 父方祖父は父方祖母の干合相手として、父系における男性像、家名、父方の現実的支えを見ます。
    reading: 父方祖母が不在なら祖父も不在として扱います。成立する場合は父方家系の男性的な影響、家名や社会的な価値観を補助的に確認します。
    questions:
      - 父方祖父や父方男性親族との関わりがあるか
      - 父方家系の仕事観や家名意識が本人に影響しているか
      - 父方祖父の存在が父への印象に影響しているか
  spouse:
    label: 配偶者
    priority: core
    place: 日支
    focus: 配偶者は日支、つまり家庭と座下を本来の場所に持ちます。結婚生活、親密さ、干合による和合願望を重点的に見ます。
    reading: 正干なら和合しようとする力が強く、結婚生活への影響も大きくなります。陰陽なら恋愛や異性縁はあっても安定しにくい傾向、場所なら結婚縁は薄めながら現実の結婚は成立し得るため、形と中身の差を確認します。
    questions:
      - 配偶者や恋愛に強く入り込みすぎていないか
      - 結婚生活が家庭の安定につながっているか
      - 配偶者の干が親や子供と重なっていないか
  mother_in_law:
    label: 義母
    priority: extended
    place: 配偶者の母
    focus: 義母は配偶者を生じる干として、婚家からの保護、結婚後の家系、配偶者の背景を見ます。
    reading: 正干なら婚家との縁が出やすく、陰陽なら必要な経験を与える相手として見ます。身近な人物、特に子供や配偶者と干を共有する場合は同居や距離感を慎重に確認します。
    questions:
      - 義母や婚家との距離感は近すぎないか
      - 義母との関係が配偶者や子供に影響しているか
      - 同居や介護など現実的な役割が発生しているか
  father_in_law:
    label: 義父
    priority: extended
    place: 配偶者の父
    focus: 義父は義母の干合相手として、婚家の男性像、結婚後の権威、配偶者側の社会観を見ます。
    reading: 義母が不在なら義父も不在として扱います。成立する場合は婚家の父性的な影響、配偶者側の仕事観や家名意識を補助的に確認します。
    questions:
      - 義父や婚家の男性親族との関係があるか
      - 婚家の価値観が結婚生活に影響しているか
      - 義父の存在が配偶者への見方に影響しているか
  child:
    label: 子供
    priority: core
    place: 月干
    focus: 子供は月干という精神的な場所を本来の場所に持ちます。子供縁、作品、表現、未来へ残すものを見ます。
    reading: 子供は陰陽どちらも正干に準じて扱います。女性は日干が生じる干、男性は配偶者が生じる干を中心に見ます。月干に強く出ると子供への意識が大きくなりやすく、地支に出ると生活上の関わりを確認します。
    questions:
      - 子供への思い入れが強すぎないか
      - 子供以外に作品や表現として燃焼しているものがあるか
      - 子供の干が親族と重なり、同居や競合が起きていないか
  child_spouse:
    label: 子の配偶者
    priority: extended
    place: 子供の配偶者
    focus: 子の配偶者は子供の干合相手として、子供が作る家庭、次世代の婚姻、家系の先への広がりを見ます。
    reading: 四角外の人物なので、正干なら縁ある存在として扱い、陰陽や不在なら影響は控えめに見ます。子供や義父母と干を共有する場合は、時期をずらして現れる縁か、同時期に競合する縁かを確認します。
    questions:
      - 子供の結婚や次世代の家族像に関心が強いか
      - 子供の配偶者と他親族の干が重なっていないか
      - 家系の先へ何を残す意識があるか
  siblings:
    label: 兄弟姉妹
    priority: core
    place: 日干・年支・日支
    focus: 兄弟姉妹は六親図の枠外ですが、自分と同じ干または陰陽干で見ます。人数ではなく、縁や影響度を判断します。
    reading: 同じ干も陰陽干も兄弟姉妹の干として扱います。宿命に出なければ兄弟がいない意味ではなく、影響が薄い、離れて暮らす、強く意識しない関係として読みます。
    questions:
      - 兄弟姉妹から受けた影響が強いか
      - 成人後も兄弟姉妹との現実的交流があるか
      - 兄弟姉妹の存在が自我や競争心に影響しているか

role_results:
  default:
    exact: |
      原点六親の正干が宿命内でそのまま成立しています。実際の人物縁として出やすく、縁があるかないかだけでなく、その人物がどの場所で本人の気を燃焼させているかを見ます。地支に出れば生活・同居・現実的な関わり、天干に出れば意識・精神的影響・人生観への影響として扱います。
    yin_yang: |
      正干そのものではなく同じ五行の陰陽違いで成立しています。縁はありますが、自然に溶け合う関係というより、違和感、距離、緊張、学びを伴う人物として出ます。身近な人物であれば強く意識されやすく、四角外の人物であれば「縁はあるが決定的ではない」くらいに抑えて確認します。
    place: |
      正干も陰陽干も宿命内にないため、その人物の場所の干で役割を補っています。人物そのものの縁は薄めに読みますが、親なら親、配偶者なら配偶者、子供なら子供という役割は人生上に現れます。実在の人物がいても、本人の内側では影響が少ない、または役割だけが残る形になりやすいです。
    other: |
      原点六親の正干・陰陽干ではなく、前段で決まった人物干から連動して導かれた干です。父、祖父母、義父母などで特に起こりやすく、原点通りの人物縁というより、母・配偶者・子供など基準人物を通した家系的なつながりとして読みます。
    missing: |
      該当する干が宿命内になく、場所による補充も行わない人物です。現実に存在しないという意味ではありません。本人の宿命構造に強く入り込まない、影響が薄い、時期や距離が限定される人物として扱います。
  extended:
    exact: |
      祖父母・義父母・子の配偶者など四角外の人物で正干が成立しています。縁ある存在として扱えますが、本人の生活を直接動かす四角内の人物ほど断定しません。日支や月支にあれば現実・心への影響を拾い、身近な人物と同じ干を共有する場合は四角内の人物を優先して読みます。
    yin_yang: |
      四角外の人物が陰陽干で成立しています。縁はありますが、正干ほど強くは扱いません。祖父母なら家系の背景、義父母なら婚家との距離、子の配偶者なら次世代の縁として、実際にどの時期に関わる人物なのかを確認します。
    other: |
      四角外の人物が連動干で成立しています。本人に直接出る人物縁というより、母・父・配偶者・子供から派生する家系の背景として扱います。身近な人物の干と競合する場合は、四角外の人物より四角内の人物の現象を優先します。
    missing: |
      四角外の人物が宿命六親として成立していません。縁がないと断定するのではなく、本人の人生を大きく左右する人物としては出にくい、または限られた時期だけ関わる相手として確認します。
  mother:
    exact: |
      母が正干で成立しているため、母子縁は自然に出やすい配置です。母からの保護、教育、価値観、生活の世話が本人に入りやすく、陽占では入力・学習・受容の構造としても働きます。近い場所にあるほど母の存在感は強く、遠い場所にあっても母から受け取った考え方や生活感覚は残りやすいです。
    yin_yang: |
      母が陰陽干で成立しているため、母縁はありますが、素直に受け取るよりも反発、吟味、距離感を伴いやすい母です。母の言葉や保護をそのまま飲み込まず、自分なりに解釈し直す力にもなります。実際の母が不器用、子育て下手、距離が近すぎる、または本人が母を客観的に見て育つ形も確認します。
    place: |
      母の正干・陰陽干が宿命内になく、母の場所の干で補っています。母縁は原則薄めです。母が忙しい、愛情が伝わりにくい、離別や早い自立で関わりが薄い、逆に愛情が多くても本人には母縁として響きにくい、など複数の現れ方があります。母が実在していても、本人の宿命では母の影響を大きく受けない形として見ます。
  father:
    exact: |
      父が正干で成立しています。父は母の干から連動して決まるため、母縁が安定しているほど父も自然に成立しやすくなります。父親像、理想、権威、仕事観、男性像として強く出やすく、父を尊敬するか反発するかのどちらかに振れやすい人物です。
    yin_yang: |
      父が陰陽干で成立しています。父縁はありますが、父らしさへの違和感、距離、理想化と幻滅が混じりやすい配置です。父との実際の仲の良し悪しだけでなく、本人の中に残る父親像、異性観、仕事観への影響を確認します。
    place: |
      父の正干・陰陽干が宿命内になく、父の場所である年干を補っています。父そのものの縁は薄めです。父は概念的存在になりやすく、実際に近くにいても本人の中では理想像、権威、反発対象として残ることがあります。
    other: |
      父は原点干ではなく、宿命で成立した母の干から連動して導かれています。母が正干でない場合、父も原点通りの父縁としては強くなりにくく、母との関係、家庭内での父の位置、父親像の揺れを合わせて見ます。
  spouse:
    exact: |
      配偶者が正干で成立しています。日干と干合する相手なので、和合したい本能、親密さ、結婚生活への入り込みが強くなります。良い夫婦和合になれば安定しますが、和合できない相手に強く向かうと、寂しさや依存、相手への執着として燃焼しやすいため、関係の実質を確認します。
    yin_yang: |
      配偶者が陰陽干で成立しています。異性縁や恋愛感情は出ますが、正干ほどの和合性はなく、安定した結婚生活に収まりにくい傾向があります。恋愛で止まる、相手が変わりやすい、友人関係や博愛的な関わりになりやすいなど、親密さの持続力を確認します。
    place: |
      配偶者の正干・陰陽干が宿命内になく、日支の場所の干で補っています。結婚縁は薄めですが、現実には結婚に至ることも少なくありません。その場合は形としての結婚と、本人の内側で求める親密さがずれやすく、離婚、問題、後悔、子供中心で家族を維持する形を確認します。
  child:
    exact: |
      子供干が成立しています。子供は陰陽干も正干に準じて扱うため、成立していれば子供縁、作品、表現、未来へ残すものが人生上の燃焼先になります。実子だけでなく、創作物、育成、教育、後進への継承として出る場合もあります。
    place: |
      子供の正干・陰陽干が宿命内になく、子供の場所である月干を補っています。子供ができないという意味ではありませんが、子供縁は薄め、子育てが苦手、思い通りに育ちにくい、子供との距離感に課題が出る、といった形を確認します。子供以外の作品・表現で燃焼できているかも見ます。
    missing: |
      子供干が宿命六親として成立していません。現実の子供の有無ではなく、本人の宿命上、子供や作品に人生を大きく預ける構造が弱いと見ます。大運・年運で子供干が巡る時期は別途確認します。
  siblings:
    exact: |
      兄弟姉妹の干が宿命内に出ています。同じ干も陰陽干も兄弟姉妹として扱い、兄姉・弟妹の厳密な区別よりも、本人への影響度を重視します。兄弟姉妹が実際にいるかどうかではなく、その存在をどの程度意識し、支え・競争・同格感として使っているかを確認します。
    missing: |
      兄弟姉妹の干が宿命内にありません。兄弟姉妹がいないという意味ではなく、影響が薄い、離れて暮らす、深く干渉しない、無意識の交流にとどまる、といった形です。実際に兄弟が多くても、本人の人生判断に強く入り込まないことがあります。

role_position_results:
  default:
    day_stem: |
      日干は自分自身の場所です。ここに人物干が重なる場合、その人物を通じて自我や本人のあり方を燃焼している可能性があります。実在の人物として読むだけでなく、その人物テーマが本人の性質として内面化していないかを見ます。
    day_branch: |
      日支は家庭・座下・自分を支える現実の場所です。ここに人物干があると、一緒に暮らす、生活を支える、家庭の安定や不安定に直結するなど、現実の距離が近くなります。本元に出るほど支える力は強くなります。
    month_branch: |
