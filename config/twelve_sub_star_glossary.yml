天報星:
  reading: てんぽうせい
  power: 3
  short: 変転変化。陰陽両極を感知し、環境変化や多芸多才さとして出る
  basic: 母親の胎内にいる胎児のエネルギーです。物事の陰陽両極を感知する能力があり、めまぐるしい「変転変化」が特徴です。
  youth: 親の影響で引越しなど環境が変わりやすい時期です。気持ちも変化しやすいお天気屋ですが、理屈で割り切れない不思議な感性を持ち、何でも受け入れます。多芸多才で器用であり、普通なら無理だと思われるスケジュールも難なくこなします。
  middle: 臨機応変の対応力が出て、変動の多い環境で活躍します。しかし器用さゆえにひとつに定まりにくく、職や環境の変化が多くなります。運を掴むと竜巻のように上がり、上がりすぎると急降下するなど、運勢が急変しやすい時期です。
  old: 多趣味で生涯現役の強いエネルギーを持つため、忙しい晩年になります。家庭運と社会運がシーソーしやすく、仕事に精を出すと家庭がおろそかになり波乱を含むこともあります。問題解決能力や危機管理能力に優れます。

天印星:
  reading: てんいんせい
  power: 6
  short: 無心・甘受。人に愛され、困った時に自然と助けられる
  basic: 生まれたばかりの赤子のエネルギーです。無心・無の力・甘受が特徴で、人に愛され、困った時には自然と助けられる「養子」のような気質を持ちます。
  youth: 素直で純真、ユーモアがあり明るく人に好かれます。うっかりミスも許されるさわやかな人徳を持ちますが、受け身の交際になりやすく、自分から動くと上手くいかないため親や目上への依存心が強くなります。
  middle: 人間関係が良好で、助けてくれる人が現れます。人に影響されやすく八方美人になりがちですが、対人トラブルが起きても時の流れに任せると周囲が自然と解決してくれます。大人になっても無邪気な幼児性が残ります。
  old: 人間的に穏やかで、かわいいお年寄りになります。若い人とも交流でき、誰からも好かれるため交際範囲が広まります。一方で欲望や執着心がないため、人に騙されたり利用されたりすることもあります。

天貴星:
  reading: てんきせい
  power: 9
  short: 純粋努力。完全さを求めて知識を吸収し、自己形成していく
  basic: 成長して自意識を持ち始めた子供のエネルギーです。純粋な努力家で、完全さを求めて貪欲に知識を吸収し、自己形成をしていく「純粋努力」の星です。
  youth: 素直で親や先生の言うことをよく聞き、努力して身につける力があるため勉強がよくできます。潔癖で曖昧さを嫌い、論理的ですが自己表現は下手で、かっこつける気負いを持つこともあります。
  middle: 子供っぽい部分が残り、良い時は舞い上がり悪い時は落ち込むなど上下動が激しい時期です。仕事と家庭の両立が難しい特徴を持ち、おだてに弱くだまされやすい面もあります。資格取得やスキルアップなど、学ぶことに良さが出ます。
  old: 年をとっても若さを失わず、おしゃれでプライドも高く若々しいイメージになります。晩年になってから急に学習意欲が出たり、芸事や読書などへの好奇心が衰えません。しっかりした配偶者を得て頼ることができる運を持ちます。

天恍星:
  reading: てんこうせい
  power: 7
  short: 現状脱皮。夢とロマンに向かい、外の世界へ動く
  basic: 子供と大人の狭間にいる思春期のエネルギーです。現状からの脱却、親への反抗心、外側志向が芽生え、夢とロマンに向かって行動する「現状脱皮」の星です。
  youth: 離郷運があり、人生の早い時期から親元を離れる傾向があります。早熟で異性への憧れも早く、やりたいことに出会うと運勢が上昇しますが、見つからないと遊びや恋の遍歴に走ります。内面の孤独を明るさで隠すような生き方になります。
  middle: ロマンティストで仕事や家庭に夢を求め、現実離れして批判を浴びることもあります。単身赴任や転職などが起こりやすく、華やかな世界に向きます。恋多き夢多き時期であり、家庭を持っても外の世界を求めるため色難に注意が必要です。
  old: 若々しく華やかなお年寄りになり、孫とも対等に交流できます。一箇所に留まれず転居や旅行を好みます。風流の世界で良さを発揮するため、自己表現できる趣味などを持つと良く、若者の良き理解者として好感を持たれます。

天南星:
  reading: てんなんせい
  power: 10
  short: 猛進躍動。一本気で直情径行、改革へ進む青年の力
  basic: 社会に第一歩を踏み出した青年のエネルギーです。一本気で直情径行、改革の旗を手に猛進する革命家のような「猛進躍動」のパワーを持ちます。
  youth: 強い自負心と冒険心を持ち、自己表現がストレートで周囲の反発を買うこともあります。一本気で批判精神も強く、失敗を恐れず新しいことに挑戦する素晴らしい力を発揮し、壁を乗り越えて自己を完成させます。
  middle: 働き盛りで大きなエネルギーを発揮します。直進型ゆえに行き過ぎた失敗や争いに巻き込まれることもあります。自分でやろうとする意識が強すぎると出る杭は打たれますが、挫折を乗り越えるたびにスケールアップします。評論家的な傾向も出ます。
  old: 老いても盛んで、時に辛辣な批評をします。体力もありますが、頑張りすぎると「年寄りの冷や水」になります。ワンマンで激しい性情が出ますが、根は愛情豊かで面倒見も良いです。楽隠居ではなく、長く活躍できるエネルギーです。

天禄星:
  reading: てんろくせい
  power: 11
  short: 円熟安定。経験と安定に大人の力強さが加わる
  basic: 完成された壮年のエネルギーです。経験と安定に大人の力強さが加わった頼りになるハイパワーで、「円熟安定」や「職人」のエネルギーとも呼ばれます。
  youth: 子供の頃から観察力が鋭く、大人の目を持った責任感の強い子になります。計画性があり、失敗を避けて着実にこなします。ひとつの事に打ち込めると、技術や知性の面で良さを発揮します。
  middle: 常識的な人間になり、安定した人生を歩みます。仕事ぶりも堅実で信頼が厚く、急激な環境の変化は起こしません。長い間努力してきたことが「職人技」として脚光を浴びるようになります。
  old: 穏やかで充実した老後を送り、堅実な生き方の結果がきちんと出ます。自分の身内を守る意識が強まり、孫の代まで配慮する頼りになる老人になります。仕事をしていれば最後まで責任ある地位を保ち続けます。

天将星:
  reading: てんしょうせい
  power: 12
  short: 重厚長大。トップの力で、苦難を越えて大きくなる
  basic: 人生の頂点を極めたトップのエネルギーです。新しい世界を切り開く帝王の力であり、波乱と苦難を乗り越えて大きくなる「重厚長大」の星です。
  youth: 最大エネルギーの消化が難しく、過保護に育つと病弱になったり後半に苦労します。大人の苦労をするか、激しい行動力で発散することで消化します。おっとり見えてもたくましいリーダーシップを持ちます。
  middle: 波乱に遭いやすく、一か八かの人生で成功します。恵まれた環境だと不完全燃焼してわがままになります。男性は波乱を通じて成功し、女性は専業主婦だと不満が溜まるため仕事や外での活動をすると良いです。孤独に強くなると鬼に金棒です。
  old: 晩年になっても組織のトップに立ったり、人の面倒を見る役割を果たします。エネルギーは衰えず人を集めて偉そうに振る舞うため煙たがれることもあります。若い時にエネルギーを完全燃焼しておかないと晩年に病むこともあります。

天堂星:
  reading: てんどうせい
  power: 8
  short: 自制老成。一歩退く謙虚さと老成した落ち着き
  basic: 第一線を退いた老人（引退・隠居）のエネルギーです。自制心が働き、一歩退く謙虚さや老成した落ち着きを持つ「自制老成」の星です。
  youth: 祖父母など年長者の影響を受けて育つことが多く、若くして老成し悟ったような考え方をします。気遣いができバランスの取れた見方ができますが、引っ込み思案で自分からの積極性には欠けます。
  middle: 冒険をせず慎重で手堅い生き方になり、現状維持や守りの傾向が強くなります。一歩退いた補佐役として良さを出し、老人からの助けを受けることもあります。人を諭したり説教をする口うるさ型になることもあります。
  old: 相談役や顧問のような立場になり、自然に親しみ年代を超えた交流ができます。力まず自然体でいると、常識的人格を備えたまろやかで理想的なお年寄りになり、安定した老後を送れます。

天胡星:
  reading: てんこせい
  power: 4
  short: 弱肉苦心。現実力は弱いが、直感・ひらめき・芸術感性が鋭い
  basic: 現実の気が衰退し、精神世界の気のみが残された病人のエネルギーです。現実面でのパワーには欠けますが、直感力やひらめき、芸術的感性が鋭い「弱肉苦心」の星です。
  youth: 感受性が鋭く、霊感が強くて心に浮かんだことが実現したりします。芸術的感性に優れますが、ハードな現実に立ち向かうパワーではないため、感性を活かせる道がないと自分の体をいじめる（厳しいスポーツなど）ことでバランスをとります。
  middle: 完全を望み夢の実現に全力を尽くします。直感力やひらめきが鋭く、論理的でない唐突な発想が新しい物を生み出すこともあります。現実面でのパワーに欠けるため、人生が途中で変化しやすく運勢の波が荒くなります。
  old: 晩年になっても夢追い人で、趣味などに没頭します。目下から助けられる運があり、精神的な世界に興味を持つようになります。感性が豊かで芸術的な才能を発揮しますが、肉体的にタフではないため現実的な仕事は長く続けられません。

天極星:
  reading: てんきょくせい
  power: 2
  short: 受身・お人好し。すべてをありのままに受け入れ、環境へ同化する
  basic: 肉体から離れた死者のエネルギーです。現実への抵抗力がなく、すべてをありのままに受け入れる「受身・お人好し」「環境への同化力」が特徴です。
  youth: 純粋で無欲、誰とでも差別なく付き合える天性の悟りの持ち主です。霊感も働き、人に助けられたり巻き込まれたりします。受身ゆえにハードな環境では苦労しますが、手先が器用で技術を身につけやすいです。
  middle: 現実味の強い生活をしていると家庭や仕事で波乱（離婚や転職など）が起こりやすいです。お人好しで暗示にかかりやすいため、良き師や書物に出会うと運が上向きます。一度大きな壁に当たって落ち込むとそこから運が上昇します。
  old: 高い次元の諦念を身につけ、お人好しで子供とも同居でき、穏やかな良いお年寄りとして評価されます。宗教的な人生観を持つこともあり、人を受け入れ助けるような役割を果たします。

天庫星:
  reading: てんこせい
  power: 5
  short: 回帰整理。過去や一つのことに集中し、深く掘り下げる
  basic: お墓の中に納められたエネルギーです。過去や一つのことに集中し、深く掘り下げる「回帰整理」や「凝り性」が特徴で、長男・長女的な役割を持ちます。
  youth: 特権意識や自尊心が強く努力家になります。正直で一本気、仕事でも遊びでもとことんまでやり抜く凝り性です。白黒はっきりつけたがり妥協ができないため、物事の分類分析や学問・芸道の探求に向きます。
  middle: 中年期から自分のやりたいことに一途に集中します。納得するととことん尽くしますが、嫌になると急に背を向ける極端さがあります。長男・長女でなくても家や墓守りなど、家系との繋がりが深まる時期です。
  old: 一途な性格がますます強まり頑固者になります。職人や芸術・学問の世界で生きてきた場合は見事な力を発揮しますが、組織人間だとつらいこともあります。一家の中心的な人物として奉仕させられますが、家族の中で孤立してしまうこともあります。

天馳星:
  reading: てんそうせい
  power: 1
  short: 宇宙飛翔。今この瞬間に強い瞬発力を発揮する
  basic: あの世から宇宙へと飛翔するエネルギーです。空間や時間の枠がなく、目の前の「今」に瞬間的な瞬発力を発揮する「宇宙飛翔」の星です。
  youth: 父親の運気とシーソーしやすく、父縁が薄くなることで自分の運が伸びます。複数のことを同時に行える能力があり、世間の常識にとらわれず自由に生きます。追い詰められた時の瞬発力は想像以上の力を発揮しますが、そそっかしさから怪我に注意です。
  middle: 精神的に落ち着きを欠き、家庭も仕事も不安定になる波乱含みの時期です。平凡な環境にいるとはみ出し者になります。多忙で無駄働きが多くなりますが、一度どん底を経験してまた上がるため、中途半端にしない方が良いです。
  old: どんな環境でも暮らせるようになります。退職などを機に波乱が起こることもありますが、前半に波乱があると後半は澄みきった自由な心境で過ごせます。孤独を感じず、無条件に何かに打ち込めば新しい世界を作り上げるカリスマ的存在になる可能性も秘めています。
