overview:
  term: 陽占数理法
  category: 表の全体像
  summary: 宿命の陽占構造に数理法をあてはめ、どの構造に気の比重が集まりやすいかを見る表です。
  detail: |-
    この表は、宿命の陽占構造に数理法をあてはめたものです。単に気の数を数えるのではなく、各気が持つエネルギー数値を使って、宿命の傾向の偏りを目に見える形にします。
    陽占数理法では、日干の扱いに注意します。陰占数理法では日干もひとつの気として数えますが、陽占は日干から見た各気との関係で構造を作るため、日干ひとつだけでは陽占構造になりません。日干が二つあって初めて貫索星をひとつ持つ形になるので、陽占数理法では日干をひとつ差し引いて見ます。
    この表からは、各星のエネルギーの大小、前に出るタイプか受け身のタイプか、相生の穏やかな流れで生きるのか剋の激しさの中で生きるのか、主観的な傾向か客観的な傾向かがわかります。
  reading: |-
    まず数値の大きいところに注目します。大きい構造ほど優先的に消化されやすく、その人の宿命の特徴として表に出ます。
    偏りが強い場合は、その構造を無視して平凡に生きようとすると無理が出やすくなります。逆に偏りが少ない場合は、バランスそのものが特徴です。表の数字は、細かい星の意味を読む前に、全体の生き方の傾向をつかむ土台になります。

struggle:
  term: 闘争
  category: 五構造
  summary: 車騎星・牽牛星に対応する構造で、剋を受ける強さ、現実に鍛えられる力、戦う姿勢を表します。
  detail: |-
    闘争は、車騎星と牽牛星の数値を合計して見る構造です。五型では白虎に対応し、打たれる強さ、攻撃されることで伸びる力、厳しい現実の中で自分を鍛える性質を示します。
    数値が強い場合、周囲から認められて安穏とするよりも、反発・競争・責任・負荷の中で力が出やすくなります。簡単には引かない自尊心や、正義感、責任感、現実を突破する力として働きます。
    ただし、強く出すぎると緊張感が抜けず、集団の中で協調しにくくなったり、一匹狼的に振る舞ったりします。闘争の強さは悪いものではなく、どの場面で鍛えられ、どの場面で戦い過ぎているかを見極める材料です。
  reading: |-
    闘争の数値は、後段の「受剋」にも入ります。受剋が強ければ、相手や環境からの圧力に反応し、意識的に行動する傾向が強まります。

input:
  term: 入力
  category: 五構造
  summary: 龍高星・玉堂星に対応する構造で、知識、学習、保護される力、外から取り入れる力を表します。
  detail: |-
    入力は、龍高星と玉堂星の数値を合計して見る構造です。五型では玄武に対応し、自分が生じられる強さ、知的な吸収力、導かれて伸びる性質を示します。
    数値が強い場合、自分から感情を激しく出して進むより、学ぶこと、考えること、保護や導きを受けながら好きなものを深めることで力を発揮します。学問・技芸・芸術・専門研究などにも向きます。
    叩かれて伸びるというより、安定した環境で褒められ、守られ、導かれることで自然に上昇しやすい構造です。感情の毒が少なく、理性や信頼感として表れやすくなります。
  reading: |-
    入力は、後段の「相生」にも入ります。入力が強い場合、自然な流れ、学び、保護、目上や知識から受け取るものが人生の大事な動機になります。

ego:
  term: 自我
  category: 五構造
  summary: 貫索星・石門星に対応する中心構造で、自分自身、守備本能、自己確立の強さを表します。
  detail: |-
    自我は、貫索星と石門星の数値を合計して見る中心構造です。五型では騰陀に対応し、自分自身の意志、守備本能、周囲に動かされにくい強さを示します。
    数値が強い場合、人から助けられても攻撃されても、そのことだけで大きく揺れにくく、自分が納得するかどうかを重視します。孤立無援のような状況で自我が目覚め、強い意志力を発揮することもあります。
    一方で、頑固さや不器用さとして出ることもあります。自分の枠を守る力が強いぶん、甘い環境では力が出にくかったり、限界を超えると急に折れたりすることもあります。
  reading: |-
    中心に関しては、資料上では貫索星は「後ろから来る構造」に近く、石門星は「前に出る構造」に近いとされています。そのため、自我は単純に受動・能動のどちらかへ入れず、中心として別枠で見ます。

expression:
  term: 表現
  category: 五構造
  summary: 鳳閣星・調舒星に対応する構造で、気持ち、表現、伝達、前へ出る感情の力を表します。
  detail: |-
    表現は、鳳閣星と調舒星の数値を合計して見る構造です。五型では朱雀に対応し、気持ちが前に出ていく強さ、誰かへ向かって思いや才能を表す力を示します。
    数値が強い場合、人の役に立つこと、表現すること、伝えること、面倒を見ることを通して自己確立しやすくなります。義侠心や同情心を発揮できる場、教育や奉仕、表現活動と相性がよくなります。
    甘やかされすぎると、支える力が過剰に働き、相手をだめにしたり、自己犠牲的な関係から離れにくくなったりすることがあります。
  reading: |-
    表現は、後段の「能動的」と「相生」に入ります。自分の気持ちや才能を前へ流していくため、主体性と自然な流れの両方を読みます。

get:
  term: 取得
  category: 五構造
  summary: 禄存星・司禄星に対応する構造で、現実的な行動、財、理解、対象を得る力を表します。
  detail: |-
    取得は、禄存星と司禄星の数値を合計して見る構造です。五型では青龍に対応し、気持ちも行動も前へ向かう力、現実の対象に働きかけて何かを得る力を示します。
    数値が強い場合、未知のものに関心を持ち、自分の思い通りに行動しようとします。既存のレールにおとなしく乗るより、自主性を重んじ、自分で自分の道を作る傾向が出ます。
    失敗しても立ち直りが早く、後に引かない強さがあります。現実的な財や人間関係、理解力としても表れますが、強すぎると自己流が強まり、周囲とぶつかることがあります。
  reading: |-
    取得は、後段の「能動的」と「打剋」に入ります。前に出る主体性だけでなく、対象を理解し、働きかけ、時には剋して得る力として読みます。

passive:
  term: 受動的
  category: 前後構造
  summary: 資料上の「後ろから来る構造」です。行動の動機やきっかけが、自分以外の存在や環境から来やすいことを表します。
  detail: |-
    受動的は、闘争と入力を合計した数値です。資料では「後ろから来る構造」と呼ばれています。
    後ろか前かは、その人の生きる姿勢を表します。見た目にはとても行動的でも、何に押されて動いているかが違います。後ろから来るものは、自分以外の動機です。客構造である車騎星・龍高星ならなおさらですが、主構造である牽牛星・玉堂星であっても、他者との比較、母がこう言ったから、周囲から求められたから、というように、他者の存在が行動の動機や引き金になります。
    後ろからの行動では、案外方向感が定まりにくいことがあります。自分がやりたいから進むというより、環境に押される、求められる、鍛えられる、守られる、学ばされる、という形で人生が動きます。
  reading: |-
    数値が能動的より大きい場合は、外部からの刺激、役割、責任、保護、学び、比較が人生のスイッチになりやすいと読みます。これは悪い意味の受け身ではありません。外から来るものをどう受け取り、自分の方向へ整えるかが鍵になります。

center:
  term: 中心
  category: 前後構造
  summary: 自我の数値です。前に出る構造にも後ろから来る構造にも入れず、自己確立の軸として別に見ます。
  detail: |-
    中心は、自我の数値です。貫索星と石門星が該当します。
    自我は、流れとしては相生に近い面がありますが、生も剋も主体は自我なので、前後や相生相剋を判断するときには中心として別枠で見ます。自分の意思、守備本能、納得感、自己確立の強さがここに表れます。
    資料では、中心に関しては貫索星は後ろから来る構造に近く、石門星は前に向かう構造に近いと補足されています。したがって中心の数値が大きい場合は、単に能動・受動へ振り分けるのではなく、自分自身の軸がどれだけ強いかとして読みます。
  reading: |-
    中心が大きい人は、周囲に動かされても、対象へ向かって行っても、最終的には自分が納得できるかどうかが重要になります。中心が小さい場合は、自分の意思よりも前後・相生相剋・主客の偏りが人生の姿勢として出やすくなります。

active:
  term: 能動的
  category: 前後構造
  summary: 資料上の「前に出る構造」です。行動の動機が自分にあり、主体的に人生を動かしやすいことを表します。
  detail: |-
    能動的は、表現と取得を合計した数値です。資料では「前に出る構造」と呼ばれています。
    前に出るのは自分です。そのため、前に出る構造が大きい場合は、主体的に人生を生きていく人と読みます。主体的とは、行動の動機が自分にあることです。自分がやりたいことをやっていく、好き嫌いがはっきりしている、自己主張もそれなり以上に出る、という形になります。
    ただし、能動的が強いことは、単に活発でよいという意味ではありません。自分の気持ちや欲求、対象を得たい気持ちが先行しやすいので、周囲との調整や、行動の目的を明確にすることが大切になります。
  reading: |-
    数値が受動的より大きい場合は、自分発の動機で動く傾向が強いと読みます。やりたいこと、表現したいこと、得たいものが人生の推進力になります。中心や主客、相生相剋も合わせると、その主体性が情的に出るのか、客観的に出るのか、穏やかに流れるのか、剋として強く出るのかが見えてきます。

control_by:
  term: 受剋
  category: 相生相剋
  summary: 闘争の数値です。対象や環境から剋され、圧力や負荷を受けることで意識的に動く傾向を表します。
  detail: |-
    受剋は、闘争の数値を使います。自分が剋される側に立つため、外からの圧力、責任、制約、競争、批判、鍛錬が行動のきっかけになりやすくなります。
    剋関係が大きくなると、何事も無意識ではいられず、ときには自分を捨てて対象の中に飛び込むこともあります。相生が「自分の興味・関心・認識」の流れだとすれば、剋は「自分以外のものへの関心度・理解度」が高まる流れです。
  reading: |-
    受剋が大きい場合は、ただ苦しいというより、外からの負荷によって目が覚め、行動が明確になると読みます。冒険心や開拓精神にもつながりますが、緊張や反発が過剰にならないかも見ます。

generates:
  term: 相生
  category: 相生相剋
  summary: 入力と表現の合計です。自然な流れ、無理のない関心、学びや表現の循環を大事にする生き方を表します。
  detail: |-
    相生は、入力と表現を合計した数値です。自我も流れとしては相生に近い面がありますが、生も剋も主体は自我なので、中心は入れずに考えます。
    相生が大きいほど、自分の自然な流れを大事にする生き方になります。無意識な行動が多くなり、自分の視野に入ることと入らないことの差が大きくなります。興味の対象外への干渉や関心は薄くなります。
    取得があれば理解力や解釈力が加わるため、極端なマイペースにはなりにくくなります。一方で、取得が薄い場合は、関心外のことを理解しようとする前向きさが弱くなります。
  reading: |-
    相生が強い場合は、無理に外へ戦いに行くより、自分の関心や自然な流れを育てることが大事です。「My なになに」の世界で、好きなもの、得意なもの、自然に続けられるものに力が集まります。

control:
  term: 打剋
  category: 相生相剋
  summary: 取得の数値です。自分から対象へ働きかけ、理解し、動かし、得ようとする力を表します。
  detail: |-
    打剋は、取得の数値を使います。自分から対象を剋す側に立つため、現実に働きかける力、理解しようとする力、対象を得る力、相手や状況を動かす力として表れます。
    剋関係が強い場合、自分の興味や認識だけで完結せず、自分以外の対象を視野に入れ、相手の出方や状況に応じて対応しやすくなります。冒険心や開拓精神も出ます。
  reading: |-
    打剋が大きい場合は、対象を得る、動かす、現実化する力が強いと読みます。ただし強すぎると、自己流の行動規範を人にも押しつけたり、相手を自分の目的の中へ巻き込みすぎたりすることがあります。

self:
  term: 主
  category: 主観・客観
  summary: 石門星・調舒星・司禄星・牽牛星・玉堂星の合計です。主観的、情的、主体的な傾向を表します。
  detail: |-
    主は、主観構造の数値です。石門星・調舒星・司禄星・牽牛星・玉堂星が該当します。
    主観構造が強い場合、人生も主観的な傾向になります。自分の感情や個人的思考を通して世界を受け取り、世界と自分との間に自然な和合感を持ちやすくなります。情的、主体的、個人的な納得感が大事になります。
    この違いは、前に出るか後ろから来るか、相生か相剋かの解釈をさらに明確にします。同じ能動的でも、主が強ければ情的・個人的に出やすく、同じ受動的でも、主が強ければ自分のポジションや納得感を守りながら受け取る傾向になります。
  reading: |-
    主が強い場合は、理屈だけでなく、気持ち、身内感覚、個人的な納得、情の通い方を重視して読みます。感情的というより、人間味や主体性が行動の根にあると見ると読みやすくなります。

other:
  term: 客
  category: 主観・客観
  summary: 貫索星・鳳閣星・禄存星・車騎星・龍高星の合計です。客観的、冷静、対象への興味や探究心を表します。
  detail: |-
    客は、客観構造の数値です。貫索星・鳳閣星・禄存星・車騎星・龍高星が該当します。
    客観構造が強い場合、世界と自分との間に距離があり、個人的感情よりも、対象に対する興味や探究心、観察、冷静さが優先されます。自分の感情以外の要素で行動が展開しやすくなります。
    この違いは、前後、相生相剋の読みを補強します。同じ前に出る構造でも、客が強いと情緒的な自己主張より、対象への興味、行動規範、サービス精神、研究心として表れやすくなります。
  reading: |-
    客が強い場合は、冷静さ、対象との距離、探究心、外側の世界への関心を重視して読みます。感情よりも、何を観察し、何を理解し、何に反応しているかを見ると特徴が出ます。
