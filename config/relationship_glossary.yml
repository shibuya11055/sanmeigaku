# 算命学の位相・干合・特殊位相の用語辞書
# 年運表・大運表のセルに出てくる関係性ラベルすべてに対応
#
# category:
#   good        : 好相性（緑系）
#   good_strong : 強い好相性（緑＋強調）
#   special     : 特殊位相（紫系）変容や自己同調など、吉凶では括れないもの
#   caution     : 注意（橙系）軽い不調・障害
#   bad         : 凶（赤系）衝突・対立
#   bad_strong  : 大凶（深紅）最強の不調和

干合:
  category: good
  short: 干同士の和合。陰陽の組で結合する
  detail: |-
    陽が陰を剋する関係において、和合しながら剋すことで合体が起こり、新しい化合物を生じる和合変化構造。
    陽→陰という剋関係は新しい五行の陰陽に変化する。
    窮地に追い込まれたときに守護神が現れ、火事場の馬鹿力を生み出す。
    また男女和合の元であり、二人の日干が干合する場合は男女として引き合い、結ばれる可能性がある。

半会:
  category: good
  short: 異質なものが融合し、大きく盛り上がる・広がる・発展する時期
  detail: |-
    半会（はんかい）／大半会（だいはんかい）

    特徴: 異質なものが融合し、大きく「盛り上がる」「広がる」「発展する」時期です。

    日支半会: 家庭や結果がまとまります。願い事が叶いやすい時です。

    月支半会: 心が拡大し、精神的に大きく成長する時です。やる気や充実感が出ます。

    年支半会: 仕事や人間関係が発展し、勢いよく前進できる時です。

    実際の事例（鈴木章氏・ノーベル化学賞受賞）: 2010年にノーベル化学賞を受賞した鈴木氏の宿命には日支と月支の「大半会」があり、運勢でも年干支と年運勢干支が「大半会」しました。これまでの研究がこの運勢で最高点に到達し、大きな勢いがつく強運の年となりました。

大半会:
  category: good_strong
  short: 半会に干一致が加わり、発展力がさらに強まる時期
  detail: |-
    半会（はんかい）／大半会（だいはんかい）

    特徴: 異質なものが融合し、大きく「盛り上がる」「広がる」「発展する」時期です。

    日支半会: 家庭や結果がまとまります。願い事が叶いやすい時です。

    月支半会: 心が拡大し、精神的に大きく成長する時です。やる気や充実感が出ます。

    年支半会: 仕事や人間関係が発展し、勢いよく前進できる時です。

    実際の事例（鈴木章氏・ノーベル化学賞受賞）: 2010年にノーベル化学賞を受賞した鈴木氏の宿命には日支と月支の「大半会」があり、運勢でも年干支と年運勢干支が「大半会」しました。これまでの研究がこの運勢で最高点に到達し、大きな勢いがつく強運の年となりました。

支合:
  category: good
  short: 気持ちと現実が一致し、狭い範囲でしっかり結びつく堅実な時期
  detail: |-
    支合（しごう）

    特徴: 気持ちと現実が一致し、狭い範囲でしっかりと結びつく堅実な時期です。自分の思い通りにしたいという「こだわり」が強くなるため、現実とズレるとストレスを抱えやすくなります。

    日支支合: 好みのライフスタイルなど、内輪で親密な環境を作ろうとします。

    月支支合: 好き嫌いがはっきりし、自分の信念ややりたいことにこだわります。

    年支支合: 好きな仕事に向かう時であり、思い通りに行かないとストレスが大きくなります。

    実際の事例（竹原信一氏・元阿久根市長）: 宿命に「亥卯」の半会（思った通りのことをしたい人）を持つ竹原氏に、年支と運勢の「支合」が巡りました。支合による「思い通りの現実を作りたい」という前進力（わがままさ）が極端に強まり、結果的に独裁的傾向が強くなって市長をリコールされる事態となりました。

方三位:
  category: good
  short: 季節の気が穏やかに広がる運勢
  detail: |-
    方三位（ほうさんみ）

    特徴: 季節の気が穏やかに広がる運勢です。それほど強烈な影響はありませんが、日支なら自然に気持ちが安定する生活環境になり、年支ならこれまで通りの流れが無理なく広がっていく時期となります。

冲:
  category: bad
  short: 減速・分断・方向転換・変化の時期
  detail: |-
    対冲（たいちゅう）

    特徴: 「減速」「分断」「方向転換」「変化」の時期です。これまでの勢いにブレーキがかかり、新しい方向を模索することになります。

    日支対冲: 自立、転居、離婚など、生活環境や私生活の変化の時です。

    月支対冲: あれこれ思い悩み、考え方が変わる時です。

    年支対冲: 仕事の勢いが減速し、転職や退職など、流れが変わる時です。

    実際の事例（根津甚八氏・俳優）: 2004年（申年）に人身事故を起こしました。根津氏の宿命には「亥と寅」の支合（行動と結果のきちんとした一致）がありましたが、年運の「申」が寅を対冲（申－寅）で壊し、さらに亥とは害（申－亥）となりました。合法が崩され、いつもとは違う行動と結果のズレが生じたことが事故の背景にあると読めます。

害:
  category: caution
  short: 外部から押し寄せる現実を受け入れざるを得ない時期
  detail: |-
    害（がい）

    特徴: 自分の意志とは無関係に、外部から様々なものが押し寄せてくる（受け入れざるを得ない）時期です。現実に逆らおうとするとストレスや病気につながりやすくなります。受身で奉仕的に過ごすことで乗り切れます。

    日支害: 家庭が病む、または過去に蓄積された結果（不倫など）が押し寄せるように露呈することがあります。

    月支害: 意に沿わないことが入り込み、内的葛藤やストレスが大きくなります。

    年支害: 仕事や前進力が病み、意志に反することがやってきます。

    実際の事例（大相撲野球賭博問題の元力士）: 2010年（寅年）に野球賭博に関与したとして相撲界を去ることになりました。宿命の日支（巳）と年運（寅）が「害」となり、日支害の「これまでの結果が病む」「過去が露呈する」という現象が顕著に現れたケースです。

刑:
  category: bad
  short: 強い意志と調整能力を持ち、前向きに攻める時期
  detail: |-
    刑（けい）

    特徴: 強い意志と調整能力を持ち、気持ちが尖って前向きに攻める時期です。自制が効かないと「争い」やトラブルに発展します。

    日支刑: 家庭や私生活での争い。

    月支刑: 心の中の戦い、内的葛藤。

    年支刑: 仕事や社会での争い。自己主張が強くなります。

    実際の事例（傷害事件を起こした人物）: 2004年に女性マネージャーへの傷害事件を起こした事例では、宿命の「申寅（生貴刑＝目下との争い）」に、運勢の刑が重なってダブったことで、暴挙（目下への争い）として現れました。

    実際の事例（市川海老蔵氏・歌舞伎役者）: 1997年からの大運「自刑」の時期に隠し子が判明し、2007年からの「合・刑」の時期には外で傷害事件に巻き込まれました。わがままな気性が出たことによる争い事（刑）の現れです。

破:
  category: caution
  short: これまでのやり方にひび割れが生じ、修復や移行が起こる時期
  detail: |-
    破（は）

    特徴: 「ひび割れ」現象の時期です。これまでのやり方が破れ、亀裂を修復したり、新しい方向へ移行したりする変化が起こります。

    日支破: 私生活の亀裂や模様替えのような変化。

    月支破: 心が破れ、ストレスの後に新しい考え方が生じる。

    年支破: 仕事上の亀裂。これまでのやり方を破って新たな方向を見出す。

    実際の事例（ワーナーミュージック・ジャパン元社長 吉田氏）: 2010年（寅年）にうつ病で自殺されました。宿命に心害（ストレス）を抱えていたところに、年支と同じ寅が巡り「害」と「破」の運勢が重なりました。なんとしても結果を出そうとする気持ちと、思い通りに進まない現実が重なり、悪い方向に破綻してしまったケースです。

天剋地冲:
  category: bad_strong
  short: 精神も現実も壊れる、人生の大きな曲がり角
  detail: |-
    天剋地冲（てんこくちちゅう）

    特徴: 精神（干）も現実（支）も壊れる、人生の大きな曲がり角（転換期）です。これまでの流れが大きく変わり、転職、退職、生活環境の変化などがドラマチックに起こります。

    実際の事例（桑田佳祐氏・ミュージシャン）: 2010年に食道がんが発覚し活動を休止しました。年運干支と宿命月干支が律音となり、年干支への対冲が二重に重なるなど、天剋地冲的なダメージや病につながりやすい大運日支の「害」などが重なった年でした。

    実際の事例（東国原英夫氏・元宮崎県知事）: 2010年から年干支と大運干支が「天剋地冲」となり、宮崎県知事を1期で辞めることを宣言しました。前の経緯に未練を残さず、明確な方向転換がなされるという天剋地冲の特徴が表れています。

律音:
  category: special
  short: 宿命の干支と運勢の干支がまったく同じになる時期
  detail: |-
    律音（りっちん）

    特徴: 宿命の中にある干支と、運勢で巡ってくる干支が「まったく同じ」になる時期です。

    同じ支が2つ重なることになるため、「新しい何かがプラスされる」という意味を持ちます。仕事なら新しい仕事や役割の増加、心なら新しい気持ち、家庭なら新しい生活環境（自立、結婚、引越しなど）が生まれます。

    宿命が持っている陽占の意味やエネルギーが倍化され、強まります。

    大きな飛躍や膨張（大半会のような）はありませんが、ひとつの分岐点や新しい自分になるタイミングとなります。

    実際の事例（桑田佳祐氏・ミュージシャン）: 2010年に食道がんが発覚し活動を休止しました。この年は、年運干支と宿命の月干支が「律音」となる年でした。ただし、この時は同時に年干支への対冲が二重に重なるなど、複合的なダメージ（天剋地冲的な要素）も重なっていたため、病気という形での大きな転換点となりました。

納音:
  category: special
  short: 干が同じで支が正反対になる、大きな転換期
  detail: |-
    納音（なっちん）

    特徴: 宿命の干支と運勢の干支が、「干が同じで、支が正反対（対冲）」になる時期です。音が納まると書くように、強度の分裂・対冲のあとに違う形に納まる、人生の「大きな転換期・変化の時」となります。

    現実が思い通りにならず分裂・分壊するようなトラブルや困難が起きやすい時期ですが、単にばらばらになるのではなく「なんとしてもひとつにまとめようとする強い思いと努力・忍耐力」が生まれます。

    壊れること自体よりも、それを防ごうと努力することによって、結果的に「新しい局面へと発展する可能性」を秘めた時期です。

    日干支の納音: 60年に一度巡ってくる大きな方向転換の時（衝撃年）であり、過去の因縁が切れる「因縁解脱」の時となります。

    月干支の納音: 心の持ち方の方向が変わる時、または家系からの因縁解脱の時となります。

    年干支の納音: 仕事面での大きな転換期です。これまでの歩みと全く違う方向へ向かう時で、転職、独立、退職などを経験しやすくなります。誰もが30歳前後でこの年運を迎え、人生を立ち止まって考える時期となります。

    実際の事例（安室奈美恵氏の大運）: 初旬（大運という10年運勢の最初の期間）に日干支の「納音」が巡っていました。幼少期に両親が離婚し、母親が一人で苦労して育てるという大変な現実（分裂）がありましたが、納音の「なんとかしようとする思いの強さ」が働き、歌手の夢を実現させるための大きな努力の原動力となりました。

    実際の事例（小沢一郎氏の大運）: 60代半ばからの大運干支と、宿命の年干支が「納音」となりました。この時期に秘書の逮捕や進退問題といった大きな困難や分裂の危機に直面しましたが、主義主張を貫いて留まるという「なんとしてもまとめる強い忍耐」を見せました。ここでの努力や忍耐が、次のステージへ向かう原動力となるのが納音の特徴です。

同:
  category: special
  short: 自刑には該当しない、同じ支がふたつ重なる現象
  detail: |-
    「同」とは、自刑（午－午、酉－酉、亥－亥、辰－辰）には該当しませんが、宿命の支と運勢の支で「まったく同じ支がふたつ重なる」現象のことを指します。自刑と似たような意味合いを持ち、原則として「プラスワン（新しいものが加わる）」という現象が運勢からもたらされると解釈されます。

    運勢において、どの場所（日支・月支・年支）で「同」が起こるかによって現れる現象が異なります。

    日支の「同」: 新しい生活環境の出現を意味します。若い時期であれば、自立、同棲、結婚、離婚といった環境の変化として現れやすく、単身赴任や引越しなどもこれに含まれます。また、身近に新しい人間関係（特に目下）が増えたり、新しい行きつけの場所が見つかるといった現象として現れることもあります。

    月支の「同」: 大運などの運勢の構造上、「月支の同」や「月支の自刑」は巡ってきません。

    年支の「同」: 新しい仕事環境の出現を意味します。社会的な場が二つになる（プラスワン）ニュアンスがあり、学生であれば学校と習い事の二つの場を持つことになります。社会人であれば、転職による新しい職場の出現や、長期の海外出張といった変化が起こることがあります。

自刑:
  category: bad
  short: 辰－辰、午－午、酉－酉、亥－亥の内的葛藤
  detail: |-
    「自刑」とは

    該当する支: 辰－辰、午－午、酉－酉、亥－亥の4種類です。

    特徴: 刑の根源とされる位相法で、「三合会局」と「方三位」という2つの合法のどちらに味方すべきか、一つの季節が板挟みになって悩む状態から生じます。

    精神性: 算命学では一般的に「身内との争い」とされますが、五行占術では「どちらにも偏れない迷い」や「自分との戦い（内的葛藤）」と解釈されます。迷いがあるがゆえに、主観を交えない冷静で客観的な観察力を持つようになります（害や貫索星に近い質とされます）。

    宿命における自刑と実際の事例

    日支・月支の自刑: 日支（配偶者の場所）と月支（心の場所）が自刑になるため、配偶者と和合的な心の交流を保ち難く、家庭を自然に調和させることが難しくなります。

    実際の事例（辺見マリ氏・歌手）: 日支・月支の自刑を持ちます。同じ支が2つあるため結びつこうとする本能はありますが、二度の結婚と離婚を経験するなど、家庭の調和に難しさが表れたケースです。

    年支・日支の自刑: 年支（行動）と日支（結果）がにらみ合う形です。行動と結果を一致させたいのに、そこに客観的なバランス構造が働くため、独自の「審美眼」などとして表れることがあります。

    実際の事例（荒木経惟氏・篠山紀信氏・写真家）: 共に年支・日支の自刑を持ちます。仕事（行動）と家庭（結果）の一致という自刑の潜在願望が、被写体への独自のこだわりや審美眼として表出していると考えられます。

    全部自刑（年・月・日すべて同じ支）: すべてが一致する潜在的な安定感を持ちながらも、どこにも傾斜しきれない客観的な自分がいる状態になります。

    実際の事例（渡辺篤史氏・俳優）: 亥－亥－亥の全部自刑を持ちます。どこにも偏らない客観性が多彩な芸につながりますが、内面には「一つにまとまりたい」という潜在的な安定願望との葛藤を抱えることになります。

    その他の事例（平山郁夫氏・画家）: 宿命に午－午の自刑を持ちます。自刑の「偏れないがゆえに非主観的な視野が開ける」という質が、対象と静かなキャッチボールを繰り返すような、静謐な自然描写の作品として表れています。

    運勢（大運など）における自刑

    前述した「同（まったく同じ支が2つ重なる現象）」と似た意味を持ち、原則として「プラスワン（新しいものが加わる）」現象が起こりますが、自刑の場合はそこに「選択の迷いや葛藤」という意味が加わります。

    年支の自刑: 転職や長期海外出張など、新しい仕事環境（2つの社会の場）が出現し、選択に迷うことがあります。

    日支の自刑: 自立、結婚、離婚、引越しなど、新しい生活環境の出現を意味します。

    ※月支の自刑は運勢の構造上、巡ってきません。

支合破:
  category: caution
  short: 支合と破が同時に成立する特殊な組み合わせ
  detail: |-
    算命学における「支合破（しごうは）」とは、位相法の合法である「支合（堅固な結びつき・一致）」と、散法である「破（ひび割れ・破壊）」が同時に両立して成立する特殊な組み合わせのことです。

    該当する組み合わせ
    「亥－寅」（木性の支合 ＋ 破）
    「申－巳」（金性の支合 ＋ 破 ＋ 刑）

    特徴

    相反する作用の共存: 「思い通りの現実を作ろうと固く結びつく（支合）」作用と、「これまでの状態にひび割れを生じさせる（破）」という相反する作用が同居します。算命学の流派によっては、この矛盾を嫌って「亥と寅」「申と巳」を破から除外する説もありますが、五行占術では「支合と共存できる構造」として破に含めて扱います。

    自ら壊すことによる矛盾の調和: 支合による強い結びつきが根底にありながら、それを自ら壊そうとする反作用が同時に働きます。たとえば「申－巳」の組み合わせでは、自分の望む結果を出そうとするプロセスにおいて、周囲との不調和や争い事が起こりやすくなります。しかし、単に一つのことに執着するのではなく、「こだわったものを自分で壊す」という反作用（バランス感覚）が働くため、結果的に複雑な形での調和（支合）が成立することになります。

冲刑:
  category: bad
  short: 対冲と刑が重なり、分断と争いが同時に出る複合位相
  detail: |-
    対冲による「減速」「分断」「方向転換」「変化」と、刑による強い意志・調整・争いが同時に重なる複合位相です。

    これまでの勢いにブレーキがかかりながらも、気持ちは尖って前に出やすくなります。自制が効かないと、方向転換の局面が争いやトラブルとして表面化します。

刑破:
  category: bad
  short: 刑と破が重なり、争いとひび割れが同時に出る複合位相
  detail: |-
    刑による強い意志・調整・争いと、破による「ひび割れ」現象が同時に重なる複合位相です。

    これまでのやり方に亀裂が入り、そこへ自己主張や内的葛藤が加わります。うまく使えば新しい方向へ移行する力になりますが、自制が効かないと対人面・仕事面のトラブルとして現れます。

害刑:
  category: bad
  short: 害と刑が重なり、受容と争いが同時に出る複合位相
  detail: |-
    算命学における「害刑（または刑害）」とは、位相法の「害（不一致・受け入れ）」と「刑（争い・調整）」が同時に重なる組み合わせのことを指します。

    該当する組み合わせ
    「寅－巳」

    特徴

    打破と環境改善の戦い: 古いものや膠着した状態、あるいは間違った方向に向かっているものを打破するための戦い（争い）となります。結果をきれいにまとめたり導いたりするよりは、「現状からの脱出」や「病んだものとの戦い」「環境改善」という意味合いが強くなります。

    悪環境での気づきと調整: 逆に言えば、この組み合わせがある時は悪環境に陥る可能性もありますが、だからこそ問題点に気づき、調整（刑）を図ることができる状態とも言えます。

    受容と争いの両面: 害の持つ「受け入れるお人好しな面」があるため人からは好かれますが、同時に過敏さが人間関係に出やすく、「自分が悩むか、争って解消するか」のどちらかになりやすいです。

    鋭い批判力: 相手の欠点や弱点がよく見えるため、口うるさいタイプになることもあります。

    激しい争い: 通常の害は思い通りにならない現実を受け入れる構造ですが、自分の気持ちが強く出てこの組み合わせが「争い（刑）」に転じると、相当激しいものになる傾向があります。

    実際の事例（堀ちえみ氏・タレント）: 日支と月支に「巳と寅」の害刑を持ちます。本人は結婚（和合）へと気持ちが動きますが、いざ生活をすると害の「和合できない本性」が結婚生活に影響を及ぼします。その際、自分の気持ちが強く出たことで「刑（争い）」に変わり、家庭内暴力などで裁判を起こし、最初の結婚相手と激しい争いの末に離婚したという経緯に、巳－寅の害刑の特徴が表れています。

合刑破:
  category: bad
  short: 支合・刑・破が重なり、結びつきと争いとひび割れが同居する複合位相
  detail: |-
    支合による堅固な結びつき、刑による強い意志・調整・争い、破による「ひび割れ」現象が同時に重なる複合位相です。

    思い通りの現実を作ろうとする力が強い一方で、周囲との不調和や争い、これまでの状態を自ら壊そうとする反作用も起こりやすくなります。単純な吉凶ではなく、こだわりを壊しながら複雑な形で調和を探る運勢です。
