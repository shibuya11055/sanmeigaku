天報星:
  power: 3
  keywords: 変化・多芸多才・きまぐれ
  short: 頭の回転が速くなり、変化や移動の多い一年を処理しやすい。
  detail: |-
    直感で判断し、スピーディーに物事をさばけるエネルギーです。変化に強い一方、気持ちや予定が変わりやすく、信頼を失わない配慮が必要です。
  void_short: 行動に一貫性がなくなり、周囲に迷惑をかけやすい。
  void_detail: |-
    天中殺時は、悪気がなくても結果的に周囲を振り回しやすくなります。勉強や趣味では力を発揮しやすいため、動き回るより学習に向けると扱いやすいエネルギーです。

天印星:
  power: 6
  keywords: 無邪気・無心・ユーモア
  short: 受け身の柔らかさが出て、人から助けられやすい。
  detail: |-
    無心でやってくるものを受け入れやすいエネルギーです。現実的な押し出しは弱くなりますが、自然と人に好かれ、困った時に助けが入りやすくなります。
  void_short: 活動力が弱まり、無気力や責任感の薄さが出やすい。
  void_detail: |-
    天中殺時は、無理に動くほど人に迷惑をかけやすくなります。落ち着いた生活と、軽い発想に流されすぎない意識が必要です。

天貴星:
  power: 9
  keywords: 探究心・学習意欲・純粋・素直
  short: 学習意欲が増し、目的達成に必要な知識を身につけやすい。
  detail: |-
    真面目さと探究心が強まり、スキルアップや資格取得に向くエネルギーです。素直さが出る一方、人を信じすぎたり、プライドでぶつかったりしない注意も必要です。
  void_short: 人間関係で苦労が増えるが、感性や芸術面には良さが出る。
  void_detail: |-
    天中殺時は、身内を含む人間関係で課題が出やすくなります。行き詰まった時は静かな環境で自分の心に問い、感性を活かす方向に寄せると扱いやすくなります。

天恍星:
  power: 7
  keywords: 夢・外の世界・好奇心・恋
  short: 現状から脱皮し、夢や外の世界へ向かう気持ちが強まる。
  detail: |-
    新しい夢、冒険心、外側への関心が生まれやすいエネルギーです。異性関係もにぎやかになりやすいため、生活の乱れや衝動的な行動には注意します。
  void_short: 物事の始めにつまずきやすく、夢の方向がぶれやすい。
  void_detail: |-
    天中殺時は、望む方向とは別の方向へ流れやすく、満足感を得にくくなります。異性問題も両極端になりやすいため、受け身で落ち着いて扱います。

天南星:
  power: 10
  keywords: パワフル・冒険・ひたむき・新しい挑戦
  short: 前進力が旺盛になり、壁を越えて新しい自分へ進みやすい。
  detail: |-
    反骨精神、冒険、希望、目的が強まり、一直線に進むエネルギーです。現実的で闘争的になりやすく、お金の出入りや行き過ぎた失敗にも注意が必要です。
  void_short: 出発点で波乱が起こりやすく、スタートは慎重に扱う。
  void_detail: |-
    天中殺時は、始めたことが出鼻をくじかれやすく、精神と現実の不一致を経験しやすくなります。覚悟と粘り強さを持ち、出直しを前提に慎重に進めます。

天禄星:
  power: 11
  keywords: 落ち着き・観察力・用心・経験
  short: 安定を守る力が働き、堅実に目的を達成しやすい。
  detail: |-
    衣食住や現実生活がテーマになり、経験を活かした慎重な行動が取りやすいエネルギーです。目上や上下関係を大切にすると運が伸びます。
  void_short: 冒険心が出て、大胆な行動や見落としが増えやすい。
  void_detail: |-
    天中殺時は、広く動くほどミスや人間関係の問題が出やすくなります。苦労を受け止め、広い視点を持つことで成長につなげます。

天将星:
  power: 12
  keywords: リーダー・親分肌・ハイパワー
  short: 強い現実エネルギーで、大きな役割を引き受けやすい。
  detail: |-
    タフに頑張り、リーダーシップや面倒見を発揮しやすいエネルギーです。権力意識や頑固さも強まるため、身体を動かして燃焼し、傲慢さを抑える視点が必要です。
  void_short: リーダーシップが落ち、人との折り合いが悪くなりやすい。
  void_detail: |-
    天中殺時は、家庭や周囲とのいさかいが増えやすく、気分も散漫になりやすくなります。平常心と平凡な日常性を守り、ひとつに集中することが助けになります。

天堂星:
  power: 8
  keywords: 自制心・老成・謙虚・指導
  short: 一歩退く謙虚さと、後始末や調整の力が出やすい。
  detail: |-
    退気のエネルギーで、自制心、広い視野、周囲への愛情が基盤になります。前面に出るより、補佐や後始末、自然や芸術に親しむ時間に良さが出ます。
  void_short: 方向が定まりにくく、心が不安定になりやすい。
  void_detail: |-
    天中殺時は、安定した環境でも焦燥感や孤独感が強まりやすくなります。精神性を高め、ひとつのことを続ける意識が必要です。

天胡星:
  power: 4
  keywords: 直感力・瞬発力・美的感性・完全主義
  short: 直感や先見性が働くが、無理をしやすく体調注意の年。
  detail: |-
    非現実的な感性と精神力が強まり、先の成り行きを見定める力が出やすいエネルギーです。完全を望みやすいため、限界を越えた頑張りや体調不良に注意します。
  void_short: 感覚が鋭くなりすぎ、迷いや不安定さが出やすい。
  void_detail: |-
    天中殺時は、直感が鋭くなる反面、神経が過敏になりやすくなります。自分だけで決めるより、頼れる人の指示や支えを得ると力を発揮しやすい時です。

天庫星:
  power: 5
  keywords: 凝り性・頑固・忍耐力・律儀
  short: ひとつのことを深く掘り下げ、極める力が出やすい。
  detail: |-
    集中力と探求心が強まり、一芸一学を身につけるには良いエネルギーです。臨機応変さには欠けやすく、夢中になるほど他のことがおろそかになりやすい点に注意します。
  void_short: 集中力が鈍り、まとめ上げることに難が出やすい。
  void_detail: |-
    天中殺時は、好きなことには集中できても、仕事や勉強が途中で挫折しやすくなります。流動的な対応力を持ち、まとめは誰かに頼る視点も有効です。

天極星:
  power: 2
  keywords: 受身・お人好し・無限・自由
  short: 受け身自然体になり、環境へ同化しやすい。
  detail: |-
    現実を押し切る力は弱まりますが、与えられた環境を受け入れ、周囲のものを吸収する力が高まります。人に流されやすいため、良い環境を選ぶことが大切です。
  void_short: 現実味が薄れ、感性や精神世界に寄りやすい。
  void_detail: |-
    天中殺時は、ハードな現実への対応が難しく、精神状態も不安定になりやすくなります。謙虚さを失わず、大きく動かないことが大切です。

天馳星:
  power: 1
  keywords: 瞬発力・無限大・四次元・自由
  short: 現実面は弱いが、目の前のことに瞬発的な力を発揮しやすい。
  detail: |-
    持続力より瞬発力が出るエネルギーです。多忙でせっかちに動きながらも、精神は世俗的な価値から離れ、与えられた役割に集中しやすくなります。
  void_short: 行動力が低下し、頑張るほど消耗しやすい。
  void_detail: |-
    天中殺時は、仕事などで無理に頑張るほど空回りしやすくなります。小さいことを一歩ずつ積み重ね、縁あることを無駄にしない姿勢が必要です。
