騰陀:
  reading: とうだ
  stars: 貫索星・石門星
  structure: 自我
  short: 自分自身の意志が最も強く、周囲に動かされにくい我が道を行く型です。
  detail: |-
    自分が納得したことだけを身につけ、人に頼られても自分が助けたいと思えば助け、嫌なら断ります。
    孤立無援のように頼れるものが自分しかない状況で、自我が目覚め、強い意志力と保守本能が働きます。
    甘い環境では力が出にくく、頑固さから生き方に不器用さが出やすい型です。異常なほど頑張れる反面、限界を超えると急に折れてしまう脆さもあります。

朱雀:
  reading: すざく
  stars: 鳳閣星・調舒星
  structure: 表現
  short: 気持ちが前に出やすく、目の前の対象や環境に運命を左右されやすい型です。
  detail: |-
    人を助けたい本能を持ち、誰かの役に立っている実感を通して自分を確立していきます。
    義侠心や同情心を発揮できる環境、教育や奉仕の世界と相性がよい型です。
    甘やかされると支える力が破壊的に働き、相手をだめにしたり、自己犠牲的な関係から離れにくくなったりすることがあります。

青龍:
  reading: せいりゅう
  stars: 禄存星・司禄星
  structure: 取得
  short: 気持ちも行動も前へ向かう、開拓者精神の強い型です。
  detail: |-
    未知のものに関心を持ち、既存のレールにおとなしく乗るより、自分の思い通りに行動しようとします。
    自主性を重んじるため過保護は合わず、自立した環境で力を発揮します。失敗しても立ち直りが早く、後に引かない強さがあります。
    根底に闘争心があるため、陰気に傾くと意地悪さが出やすく、陽気に傾くとさっぱりした愉快さになります。見た目以上に財力や人間性の奥行きを持つ型です。

白虎:
  reading: びゃっこ
  stars: 車騎星・牽牛星
  structure: 闘争
  short: 打たれるほど強くなり、逆境や攻撃を受けることで伸びる型です。
  detail: |-
    家族内での孤立、学校でのいじめ、会社での不当な扱いなど、厳しい現実に遭うほど威力を増します。
    傷つけられたプライドや悔しさが這い上がる原動力になり、自尊心の強さから簡単にはギブアップしません。
    一匹狼的に自分で道を切り開く型で、正義感や義侠心もあります。スポーツ、会計士、弁護士など、鍛錬や難関資格の世界にも向きます。

玄武:
  reading: げんぶ
  stars: 玉堂星・龍高星
  structure: 入力
  short: 保護され、導かれることで自然に伸びる知的な才能型です。
  detail: |-
    自分発の感情は強くなく、薄情にされても恨みにくく、可愛がられても大きく浮かれにくい型です。
    褒められ、守られ、導かれることで自然に上昇します。白虎型のように厳しく叩かれて良くなるタイプではありません。
    安定した環境で好きなことに取り組むと能力を発揮します。感情の毒が少なく理性が勝るため、面白みよりも信頼感が前に出やすい人物になります。

陰陽分類:
  yang: |-
    陽型は、青龍（取得）と朱雀（表現）の合計値が、白虎（闘争）と玄武（入力）の合計値より大きい場合に判定されます。
    現実社会に向かって力を出しやすく、青龍型・朱雀型ではその積極性がそのまま表れ、玄武型・白虎型では現実の仕事の中で知恵や強さを出していきます。
  yin: |-
    陰型は、青龍（取得）と朱雀（表現）の合計値が、白虎（闘争）と玄武（入力）の合計値より小さい、または同等の場合に判定されます。
    精神世界や内面領域に力が向かいやすく、学問・技芸・芸術などの分野で名声や地位を得て才能を発揮しやすくなります。
