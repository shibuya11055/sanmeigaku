生年中殺:
  category: 宿命生年天中殺
  short: 年支（社会・親の場所）が天中殺になり、親や家系との縁に特殊性が出る
  detail: |-
    宿命生年天中殺（全般の特徴）

    生まれ年の干支（社会の場所・親の場所）が天中殺になっている状態です。親（特に父親）との関係に不自然さが生じやすく、親の恩恵を順当に受けにくかったり、親との確執が起こりやすい傾向があります。

    また、現実のスタートや仕事のあり方において枠を外れた現象が出やすくなります。

生月中殺:
  category: 宿命生月天中殺
  short: 月支（心・家系の場所）が天中殺になり、精神や家系との関係に特殊性が出る
  detail: |-
    宿命生月天中殺（全般の特徴）

    生まれ月の干支（心の場所・家系の場所）が天中殺になっている状態です。精神状態が不安定になりやすく、自分自身を掌握することが難しくなります。

    安定した居場所を持てず、家系の流れから外れる役割を持ちます。また、心に枠組みがないため、霊感が強かったり、常人にはない鋭い感性を持つことが多いです。

戌亥生年中殺:
  category: 宿命生年天中殺
  short: 早い親離れで、孤独と引き換えに自分の道を開く
  detail: |-
    戌亥生年中殺

    特徴: 両親の力がどちらかに大きく偏っている環境（父親主導または母親主導）から生まれやすい宿命です。自分の道を突き進む場合は親兄弟と確執が生じますが、早い親離れをすることで、孤独と引き換えに成功を得ることができます。

    反対に、生家に留まって親兄弟と仲良くやろうとすると、自分の人生の方向性を見失ってしまいます。体質的に思考のスピードが遅くなり、何事もゆっくり時間をかけるようになりますが、それが鈍感力となり、周囲に振り回されてもやっていける強さにもなります。

戌亥生月中殺:
  category: 宿命生月天中殺
  short: 家系のカラーと違う生まれ。早い自立で運命が安定する
  detail: |-
    戌亥生月中殺

    特徴: 戌亥本来の「家系のカラーと違う生まれ」という特性が強調されます。早い親離れができれば、環境と宿命が一致し着実な人生を歩めます。

    家にとらわれて生家を離れないと、職業が不安定になったり、夢に遊ぶような状態になり、自力で運命が開かなくなります。自立が遅れるほど修正が効かず、自己喪失的な人生になる危険性があります。

    実際の事例（仲間由紀恵氏・女優）: 宿命に「戌亥生月中殺」を持ちます（日干支が庚午で戌亥天中殺、月干支が甲戌）。家系や枠組みにとらわれず、早い段階から芸能界という特殊な世界で独自の立ち位置を築いたことに、この宿命の特徴が表れています。

申酉生年中殺:
  category: 宿命生年天中殺
  short: 家系継承が途中から初代運的に変化し、精神性が高まりやすい
  detail: |-
    申酉生年中殺

    特徴: 本来は二代目として親の後を継ぐ役割ですが、それが中殺されるため、家系を継承しても途中から初代運的に変化していきます。

    年齢とともに現実面の壁が多くなり、現実的欲求が薄れて精神世界へと興味が移ることがあります。芸術、学問、宗教などの分野に身を置き、孤独の境地を切り開いて極端な精神の高まりを生み出す特殊な形です。

申酉生月中殺:
  category: 宿命生月天中殺
  short: 跡取りの役割が否定され、早い自立で波乱が少なくなる
  detail: |-
    申酉生月中殺

    特徴: 跡取りとしての役割が否定されるため難しい状況が生じます。早めに自立して家系の流れから外れれば、中庸で波乱の少ない人生になります。

    家系から離れないと家運とシーソーし、本人が犠牲になるか、自分が盛り上げ役になると他の兄弟や親の運気を奪う現象が起きます。

午未生年中殺:
  category: 宿命生年天中殺
  short: 一代運的な親から生まれ、受け継いだものを終わらせ新しく作る
  detail: |-
    午未生年中殺

    特徴: 一代で始まり一代で終わるような運命の親から生まれ、自身も一代運的になります。親に対する内的葛藤が激しくなりますが、親の跡を継ぐ場合は、先代から受け継いだものを一度終わらせて、新しい何かを作り出す役割を持ちます。

    晩年に行くほど初代運的になります。子供運に恵まれますが、自分が初代運的になると跡取りを望むようになり、子供の運命を崩してしまうジレンマを抱えます。

午未生月中殺:
  category: 宿命生月天中殺
  short: 家系の締めくくりが中殺され、家系を終わらせる役割が出やすい
  detail: |-
    午未生月中殺

    特徴: 家系の最後を締めくくる役割が中殺されるため、うまく締めくくれずに家系を終わらせてしまう事態を招きやすくなります。

    他家へ嫁いだり養子に行った場合は、その相手の家系を終わらせる（財産を還元したり食いつぶしたりする）役割になります。生家に居座ると精神的成長が遅れ自立心が育ちませんが、穏やかで誰からも憎まれない人間性になります。

辰巳生年中殺:
  category: 宿命生年天中殺
  short: 父親の運気とシーソーし、親を背負いながら独自に進む
  detail: |-
    辰巳生年中殺

    特徴: 周囲の反対や恩恵を受けずに結婚した両親、あるいは父親の運気が弱っている環境から生まれやすくなります。父親の運気とシーソーするため、父の庇護下にいると自分の人生が作れません。

    親子関係で苦労しますが、意に反して親を背負い、家系のカラーで人生を歩む傾向があります。片親縁になることも多く、残された親には非常に親孝行になります。

辰巳生月中殺:
  category: 宿命生月天中殺
  short: 早い家系離れが鉄則。単独で生きることで運命が発展する
  detail: |-
    辰巳生月中殺

    特徴: はみ出し者である辰巳が家系中殺を受ける非常に激しい形です。早い家系離れが鉄則であり、生家で安穏と過ごすと自分が家系を崩壊させる要因（突発的な事故など）になり得ます。

    単独で生き、自分を犠牲にして親兄弟を背負う生き方であれば乗り切れます。早い親離れで運命は発展しますが、現実への傾斜が強まり世の常識から逸脱する恐れがあるため、教養を身につけることが重要です。

寅卯生年中殺:
  category: 宿命生年天中殺
  short: 衰退する家柄の中で、最後を美しく締めくくる橋渡し役
  detail: |-
    寅卯生年中殺

    特徴: 両親の家柄が衰退していく流れの中で生まれる宿命です。母親の元にいる間は平穏ですが、母離れ（自立や死別）した途端に激しい行動力や無鉄砲さが表れます。

    心の片隅には母親への憧憬が残り、最終的には私利私欲を捨てて、家柄の最後を美しく締めくくる橋渡し的な役割を担います。

寅卯生月中殺:
  category: 宿命生月天中殺
  short: 生家ではなく他家や別の場所の運を守り、終盤に真価を発揮する
  detail: |-
    寅卯生月中殺

    特徴: 三代目としての役割が中殺され、自分の家系を継ぐことができなくなります。早い生家離れが開運の鍵であり、嫁ぎ先や養子先などの他家の運気を上げる役割（相手先の運を守る役割）を持ちます。

    跡取りとして生家に居座ると、家運を衰退させてしまいます。世の中に平和をもたらす役割ですが、運命の発展は遅く、人生の終盤に真価を発揮します。

子丑生年中殺:
  category: 宿命生年天中殺
  short: 初代運と親縁が逆転し、家系の質を変える役割を持つ
  detail: |-
    子丑生年中殺

    特徴: 本来は親縁なき初代運ですが、そこに中殺がかぶさることで「マイナス×マイナス＝プラス」の逆転現象が起き、不本意ながらも親縁が繋がります。

    初代運的な質を持ちながら二代目三代目的な人生を歩む複雑な生き方になります。親とは違った家風を作ろうと活発に改革を行います。男女ともに「家系の質を変える役割」を持ち、男系家系に女の子が継ぐなど、家系の曲がり角を担います。

子丑生月中殺:
  category: 宿命生月天中殺
  short: 親縁が薄く、衰退した他家を初代運的に盛り上げる
  detail: |-
    子丑生月中殺

    特徴: 親縁が薄く、養子的な要素を持ちます。嫁ぎ先や養子先の「衰退した家系」を初代運的に盛り上げる役割を果たします。相手の家系が隆盛だと快楽主義に陥り、力を発揮できません。

    生家に居着くと自己破壊的な快楽主義（酒やギャンブルなど）に陥り、生家の財を消耗させますが、後に続く子供や孫に強運者が輩出されることが救いとなります。

宿命二中殺:
  category: 二重中殺
  short: 生年中殺と生月中殺の両方を持ち、枠に収まらない強い個性が出る
  detail: |-
    二重中殺（生年中殺と生月中殺の両方を持つ）

    宿命の中に生年中殺と生月中殺の両方を持つ場合、非常に複雑で枠に収まらない強烈な個性を発揮しやすくなります。

    実際の事例（秋吉久美子氏・女優）: 宿命に「午未生年中殺」と「午未生月中殺」の両方を持ちます（日干支が丙戌で午未天中殺。宿命の年干支に午、月干支に未がある）。午未の「家系を終わらせる・枠にはまらない」という特徴が二重に強調され、独特の感性と浮世離れした孤高のキャラクター、そして既存の枠に収まらない自由な生き方として現れています。

    実際の事例（松田聖子氏・歌手）: 宿命に「寅卯生年中殺」と「寅卯生月中殺」の両方を持ちます（日干支が丁未で寅卯天中殺。宿命の年干支に寅、月干支に卯がある）。寅卯の「自分の家系を継がず、他家や別の場所で運気を上げる」「激しい行動力」という特徴が二重に強調されています。生家を早くに離れて芸能界という別世界で圧倒的な頂点を極め、常識にとらわれないスキャンダラスな生き方すらも自らのスター性に変えてしまう、強烈な運命の燃焼が見て取れます。

日座天中殺:
  category: 特殊宿命天中殺
  short: 現実・家庭・配偶者の場所の枠組みが生まれつき欠落する
  detail: |-
    日座天中殺（日座中殺）

    自分が座る現実（結果・家庭・配偶者の場所）の枠組みが生まれつき欠落している、非常に特殊な宿命です。

    該当する干支: 甲戌（11番）、乙亥（12番）。

    特徴と葛藤: 現実の枠組みを形作ることが難しいため、一般的な「平凡で円満な家庭」を維持することに宿命的な困難を抱えます。子供が生まれる（特に数が増える）と、夫婦関係や親子関係に波乱が生じやすくなり、一家団欒を持続させることが難しくなる傾向があります。

    完全な結果を残そうとしたり、物事を綺麗にまとめようとすると挫折しやすくなります。

    才能と活かし方: 物事のスタートダッシュや、計画・企画立案など「何かを始める」ことに関しては、周りを巻き込んで動かす他に類を見ないほどの素晴らしい能力を発揮します。常識の枠に収まらないため、一芸一学に秀でた専門家や芸術家などに適性があります。

    生まれ故郷で一家を成すことが難しいため、海外での生活、国際結婚、故郷を遠く離れた場所での生活など、一般的な常識から外れた環境に身を置くことで、特異な才能を見事に活かすことができます。

日居天中殺:
  category: 特殊宿命天中殺
  short: 精神の枠組みが欠落し、冷静な批判力と反省の難しさを持つ
  detail: |-
    日居天中殺（日居中殺）

    精神の枠組みが欠落する「辰巳天中殺」の影響を受けつつ、自分自身のフレームにも天中殺現象が被さるため、自覚が難しく、精神面で強さと激しさを内包する宿命です。

    該当する干支: 甲辰（41番）、乙巳（42番）。

    特徴と葛藤: 目の前の現実を生きながら、そこに「自分」をうまく取り込めないため、現実を自分から切り離して客観的に眺めるようになります。その結果、是々非々で物事を判断する非常に冷静で鋭い批判力（正論）を持ちます。

    自分自身を省みる機能が欠落しているため、他人には厳しく正論を吐く一方で、自分自身の経験や失敗から学ぶことが難しく、同じ過ちを繰り返しやすい（反省が難しい）という弱点を抱えます。

    行動で批判されると反省するのではなく、別の精神世界へ逃げ込む傾向があり、病的な現象も起きやすいとされます。

    才能と活かし方: 親や自分が育った環境とは「正反対の精神性」を出す役割を持ちます（例: 商人の家系から学者が生まれるなど）。そのため、親から祝福されるような順当な結婚はうまくいきにくく、価値観の違う相手や異質な環境の人と、別々のスタンスで交流する方が真実の関係を築けます。

    社会への適応が難しい側面があるため、信仰やスピリチュアルな道へ進むことも多く、日座天中殺と同様に一芸一学に秀でることが自分を活かす方向につながります。

生日中殺:
  category: 特殊宿命天中殺
  short: 親から見て、本人が理解しにくく枠に収まらない存在になりやすい
  detail: |-
    生日中殺（生日天中殺）

    年干支（親の場所）を基準にして出した天中殺の範囲内に、自分の日干支（自分自身）がすっぽりと入ってしまっている状態です。

    特徴: 親の視点から見たときに、「自分の子供（本人）が何を考えているか理解できない」「枠に収まらない」という天中殺現象として映ります。

    特に本人が結婚して家庭を持つ（日支が埋まる）と、親との違いや不適合が明確になり、親とうまくいかなくなりやすいとされています。ただし、日座や日居中殺ほど強烈な現象が出るわけではありません。

大運天中殺:
  category: 運勢の天中殺
  short: 大運で20年間巡り、陽転・陰転の両極端な運気になる
  detail: |-
    大運天中殺

    自分の天中殺が、大運（10年運勢）の期間に20年間にわたって巡ってくる時期です。

    運勢の枠組み（フレーム）が完全に外れるため、実力の何倍もの力を発揮して一気に跳ね上がる（大成功する＝陽転）か、底辺に向かって下降し続ける（陰転）かの両極端な運気となります。

    親の保護がない状態、若い頃からの苦労、独立して単独で動ける環境（フリーランスなど）にいるほど「陽転」しやすく、実業や芸能、スポーツなどで莫大な財や地位を築くことがあります。逆に過保護であったり、公務員や会社員など枠組みの強い環境にいると陽転しにくくなります。

    陽転した場合、20年の最後の5年間は運勢の枠組みが戻ってくるため、一気に運気が落ち込む「精算期」が訪れます。この時期には無理をせず、欲をかかずに流れに身を任せることが重要です。

変剋律:
  category: 運勢の天中殺
  short: 大運で異常干支が連続し、才能が異常に伸びる期間
  detail: |-
    変剋律（へんこくりつ / 才能天中殺）

    大運において「異常干支」が2つ以上連続して巡ってくる期間（20年〜30年間）のことです。

    大運天中殺が「現実的な強運（財や地位）」を引き起こしやすいのに対し、変剋律は「異常に才能が伸びる期間（才能天中殺）」となります。

    この期間に入ってからの「精神的な苦労」や「異常な体験」が引き金となり、学問、芸術、特殊技能などの分野で神童や天才と呼ばれるような特異な才能を発揮しやすくなります。
