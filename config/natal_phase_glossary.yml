三合会局:
  category: 合法
  short: 四季の中心となる気が他の季節の気を巻き込み、一つの強大な五行を生み出す異種融合です。
  detail: |-
    宿命が持つ位相法とは、自分の主観や意志とは無関係に脳内に組み込まれた「現実処理のオペレーションシステム」のようなものです。入力された現実のデータをどのように処理し、行動や感情に結びつけるかの無意識のパターンを決定づけます。

    三合会局は、四季の中心となる気が他の季節の気を巻き込んで一つになる強大な異種融合です。行動範囲も思考範囲も幅広くなり、違った既存のものをまとめて全く新しい強大な五行を生み出すスケールの大きさや、常識枠を外れる本性を持ちます。

    水局（申・子・辰）は、精神的なイメージや知識を現実へ高速に展開する才能として現れます。木局（未・卯・亥）は、感知したことを即行動へ移し、思い通りの結果を出す作用として現れます。火局（寅・午・戌）は、既存の枠を超えた想念をまとめる創造力になり、金局（巳・酉・丑）は、現実的な闘争心や社会での強さ、雑多な人々をまとめるカリスマ性として現れます。

半会:
  category: 合法
  short: 三合会局を構成する3つの支のうち2つが結びつき、物事を盛り上げ、広げ、発展させます。
  detail: |-
    半会は異種融合であり、物事が大きく「盛り上がる」「広がる」「発展する」作用を持ちます。

    日支・月支の半会は「結果と心」の融合です。家庭の中に色々なアイデアを持ち込み、自分好みの家庭を作ったり、内輪の仲間たちを調和させる仲介役を果たします。

    月支・年支の半会は「心と仕事」の融合です。好きな仕事であればどんな雑多なことでもこなせ、精神的成長が早くスケールが大きくなります。ただし、思いだけが異常に膨れ上がると、周囲を巻き込んで暴走することもあります。

    日支・年支の半会は「結果と行動」の融合です。心を介在させないため、純粋に物事を起こし、ハイスピードで結果を出します。公私の区別がなくなりやすいのも特徴です。

支合:
  category: 合法
  short: 狭い範囲で隙間なく堅固に結びつき、自分なりの現実の枠組みを作ろうとします。
  detail: |-
    支合は、半会が「異種をまとめる」のに対し、「狭い範囲で隙間なく堅固に結びつく」完全一体感の作用です。自分の思いや好みに忠実であり、新しい自分なりの現実の枠組みを構築しようとする強いこだわりが生まれます。

    日支・月支の支合は「結果と心」の完全一致です。思い通りの現実を作りたい想念が働き、マニアックな趣味を持つこともあります。思い通りにならないと我慢できないわがままさになる危険もあります。

    月支・年支の支合は「心と仕事」の完全一致です。自分のやり方にこだわり、好きなことを職業にするのが原則です。

    日支・年支の支合は「結果と行動」の完全一致です。現状を無視してでも、自分の思ったことを思い通りの結果へ持っていこうとする強さとして現れます。

方三位:
  category: 合法
  short: 同じ季節の気が平和で穏やかに、持続的に広がる作用です。
  detail: |-
    方三位は、同じ季節の気が「平和で穏やかに持続的に広がる」作用を持ちます。
    思い切った方向転換は難しくなりますが、心も行動も結果も同じ色で続いていく自然な広がりを生みます。

    冬の支（亥・子・丑）が揃う方三位では、争いのない祈りの経営や、フランチャイズのような持続的で自然な横への広がりとして現れることがあります。

対冲:
  category: 散法
  short: 正反対の支同士が衝突し、勢いにブレーキをかけ、観察力や対応力へ変わります。
  detail: |-
    散法は、まとまりを壊し、進化や新しいものの創造を促す作用です。客観的、偶発的、分析的な傾向を持ちます。

    対冲は、円周上で正反対の位置関係にある支同士の衝突です。勢いにブレーキをかけて物事を細分化するため、冷静な観察力、気遣い、臨機応変な対応力という能力に変わります。

    月支・年支の対冲は「心と行動」の分断です。感情をストレートに出さず、場面に対応して冷静な表現や気遣いができる能力になります。

    日支・月支の対冲は「結果と心」の分断です。一つの結果に安住せず、結果に対する多様な観察力となります。

    日支・年支の対冲は「結果と行動」の分断です。着地点が分散してまとまらないため、分析力や対応力として発揮されます。

天衝冲:
  category: 散法
  short: 陽の12支同士が正反対で衝突し、精神的なことを原因として現実の変化へつながる対冲です。
  detail: |-
    天衝冲は、散法のひとつである対冲をさらに細かく分類したものです。対冲とは、12支の円周上で正反対の位置関係にある支同士の衝突を指します。

    天衝冲の定義:
    12支を「支の本元の陰陽」によって分けた際、向かい合った陽の12支同士の衝突を天衝冲と呼びます。

    該当する組み合わせ:
    寅－申
    亥－巳
    辰－戌

    特徴と現れる現象:
    算命学において陽は精神を意味するため、天衝冲は「精神的なことが原因で衝突（冲動衝突現象）が起こる」のが特徴です。宿命にこの組み合わせがある場合も、運勢で巡ってきた場合も、精神面での衝突が引き金となります。

    具体的なプロセス:
    天衝冲は、精神的な動機から始まって、結果として現実が変化していくプロセスをたどります。たとえば、自分の正義感に反することを相手がしたために喧嘩になった場合、「正義感に反する」という精神的な動機が原因となり、結果として「喧嘩になり、友達をなくす」といった現実の変化へつながります。

    木左彩子氏（元アナウンサー）の事例:
    宿命の月支に亥、年支に巳を持ち、この亥－巳が天衝冲に該当します。気持ちが先に働く衝突であるため、心（月支）が仕事・行動（年支）を分断する構造になります。この分断作用により、個人的な感情や思いをそのまま行動や言葉として表に出さず、心と表現の間に屈折や抑制が働きます。

    思いが分断されることで、現状を冷静に分析し、部分部分に細かい配慮をする気遣いの構造へ変化します。また、心の中で複数の手段や方法が想定されるため、最適な方法を瞬時に引き出せる臨機応変さにつながります。こうした感情の細分化と冷静な対応力が、場面に合わせて的確で多様な表現を行うアナウンサーという職業において能力として発揮されていると解釈されます。

    氷川きよし氏（歌手）の複合例:
    寅・申・巳の生貴刑を持ち、この中の寅－申が天衝冲に該当します。寅と申には共通の干（戊）があり結びつこうとする一方で、庚が甲を剋し、壬が丙を剋すという激しい剋関係があります。

    天衝冲の精神的な衝突・分断と、刑のバランスを取ろうとする争いが同居するため、激しい内面的葛藤を抱えやすくなります。このケースでは、天衝冲による破壊や分断の作用を刑が抑制し、外部に対しても厳しい意識が働き、それが大きな前進力や表現へのエネルギーへ転化されます。

害:
  category: 散法
  short: 精神と現実が完全不一致となり、受容力や過敏な感知力として働きます。
  detail: |-
    害は、精神と現実の「完全不一致」の作用です。自分の意志に関わらず現実が押し寄せるため、病気やストレスの要因とされがちですが、主観を交えずに現実をそのまま受け入れる「過敏な認識能力」「受容力」という突出した才能にもなります。

    月支・年支の害は「心と社会」の不一致です。主体的な方向性はなく、現実のほうから勝手に入ってきます。物事のポイントを瞬時に把握する直観力になります。

    日支・月支の害は「心と家庭」の不一致です。気に入った家庭を作れませんが、気に入らない家庭でもやっていけます。広大な受容力があり、意図しないものまで引き寄せる霊感的な引力にもなります。

    日支・年支の害は「結果と行動」の不一致です。自分で思い通りの結果を出せない代わりに、結果から人が見抜けないものを読み取る鋭い感知能力となります。

刑:
  category: 散法
  short: 三合会局と方三位の板挟みから生じる葛藤と迷いで、争いや調整の作用になります。
  detail: |-
    刑は、「三合会局」と「方三位」の板挟みから生じる葛藤と迷いの作用です。どちらにも偏らないように見張り、バランスが崩れると争ってでも元に戻そうとするため、闘争や調整の現象が起きます。

    生貴刑（寅・申・巳）は若い勢いの争いです。目下との争いや、現状を打破する激しい前進力となります。

    旺気刑（子・卯）は熟達の争いです。距離を保ち、ワンマン傾向が出ますが、スケールの大きさを感じさせるリーダー気質になります。

    庫気刑（丑・戌・未）は大人の調整です。正義感や思想に基づき、全体のバランスを考えて仲介や批判を行います。

自刑:
  category: 散法
  short: どちらにも偏れない迷いから、客観的で非主観的な視野が生まれます。
  detail: |-
    自刑は、どちらにも偏れない迷いから生じる、客観的で非主観的な視野です。
    偏れないがゆえに、対象を静かに観察し続ける視野や、独自の審美眼として現れることがあります。
    年支・日支の自刑では、仕事と家庭の一致という潜在願望に客観的バランスが働き、被写体へのこだわりや美意識として表出することがあります。

破:
  category: 散法
  short: 支合を斜めに崩すひび割れ現象で、批判力や観察力、新しい方向への契機になります。
  detail: |-
    破は、支合を斜めに崩す「ひび割れ」現象です。
    害の受容力と刑のバランス感覚を合わせたような性質で、細かい批判力や観察力、気配りとなります。
    古い何かが破れて、新しい方向へ進む契機となります。

大半会:
  category: 特殊位相法
  short: 半会する支の上に同じ干が乗り、強烈な推進力や執念になります。
  detail: |-
    特殊位相法は、通常の支の法則に加え、干（精神）が強く連動することでさらに強力な作用を及ぼす位相法です。

    大半会は、半会する支の上に「同じ干」が乗る現象です。異種融合の広がりに自我の要素が加わり、「なんとしてもこの思いを貫き通してまとめる」という強烈な推進力や執念になります。

    月支・年支の大半会では、自分の音楽的スタイルや考え方への強い執念が、一つの集団を長くまとめ上げる力として現れることがあります。日支・年支の大半会では、思い切った行動力で大きな結果を出そうとする前進力が高まります。

律音:
  category: 特殊位相法
  short: 宿命内に全く同じ干支が並び、二面性が自然に融合します。
  detail: |-
    律音は、宿命内に「全く同じ干支」が並ぶ現象です。二面性が自然に融合しており、無理のない一体感があります。偏った陽占の才能を貫く生き方になります。

    月支・年支の律音は、心と行動の無意識の一致です。思い込むと制御が効かず、そのまま行動へ直結しやすい危うさもあります。

    日支・年支の律音は、行動と結果の自然な一致です。複数のフィールドを「すべて自分」という一体感で生きるような形になります。

    日支・月支の律音は、心と結果の一致です。一人で様々な役柄や物を巧みに利用して再現する才能として現れることがあります。

納音:
  category: 特殊位相法
  short: 干が同じで支が対冲し、分断を分析力や問題解決能力に変えます。
  detail: |-
    納音は、干が同じで支が対冲する現象です。思いが離れない中で強度の分断が起きます。
    ある範囲を輪切りにして細分化するスキャナーのような分析力や問題解決能力となり、終わりのない積み重ねを意味します。

    日支・月支の納音では、思いを貫く信念の中で現実を細かく分断し、緻密な指揮や問題解決へつながることがあります。
    日支・年支の納音では、目的のもとで細かな現実を無限に積み重ねる形になります。
    月支・年支の納音では、思いを持続させながらも細分化された自我により、表よりも裏方で力を発揮することがあります。

天剋地冲:
  category: 特殊位相法
  short: 干が剋関係、支が対冲となり、精神も現実も砕かれる強烈な位相法です。
  detail: |-
    天剋地冲は、干が激しい剋関係、支が対冲という、精神も現実も砕かれる強烈な位相法です。
    まとまりがないゆえに、ぎらぎらした欲望が削ぎ落とされ、人を惹きつける不思議な魅力や、常識外れの度胸・行動力を生み出します。

    月支・年支の天剋地冲では、多方面でマルチに活躍する不思議な魅力や大物感として現れることがあります。
    日支・月支の天剋地冲では、落ち着いた生活は望みにくい一方、相手のデータを細かく分析・予測して戦う独自理論に活かされることがあります。
    日支・年支の天剋地冲では、行動が結果を壊すため一貫した主義主張が反映されにくく、考えずに動きながら対応する臨機応変さとして現れることがあります。

合法と散法の同居:
  category: 複合
  short: 相反する位相法が同時に存在し、精神的な不安定さや突発的リスクを生みます。
  detail: |-
    宿命の中に相反する位相法が同時に存在すると、アクセルとブレーキを同時に踏むような状態になり、精神的な不安定さや突発的な事故・トラブルを引き起こしやすくなります。

    月支・年支の半会と、日支・月支の刑が同居すると、心を中心に合法と散法が引っ張り合うため、バランスをとるのが難しくなります。
    支合と自刑が混在する場合、普段は自刑がバランスを保っていても、運勢によって支合が壊されると、合法と散法のぎりぎりのバランスが一気に崩れることがあります。
