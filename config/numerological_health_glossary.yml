dominant_branch_details:
  木:
    子: バランスが良く保たれている。頑健というわけではないが、ある一箇所のみが悪くなるということが少ない。弱さの連動という特徴があり、ひとつが悪くなると、それにともなって、いろいろなところが連鎖的に悪くなる。よく言えば悪い状態の中である種のバランスが保たれることになり、決定的なダメージにはならずに、それなりの健康を保つことができる。まとめて病気をするという不思議な形を持っている。
    丑: 全体に太りやすい。胃腸や消化器系に弱さがある。人生速度は遅いが、時に一気に進むことがあると、事のあとに極端な病気にかかることがある。瞬間的なエネルギーを使うようにはできていないので、慌しい環境の中では体調を崩す。
    寅: 内臓よりも外側に弱さが出る。骨格、筋肉、神経、スジなど年齢とともに外側の病気を引き起こす。神経痛やリューマチなどにかかりやすい体質。人生の歩みは遅く、一足飛びの進み方はしない。病気になっても急激なものは少なく、長い時間かけて起こることになる。長寿の傾向。内臓では肝機能が中年以降弱くなる（若いときは強い）。若年期と中年期と体質が大きく変化する。
    卯: 内臓よりも外側に弱さが出る。骨格、筋肉、神経、スジなど年齢とともに外側の病気を引き起こす。神経痛やリューマチなどにかかりやすい体質。人生の歩みは遅く、一足飛びの進み方はしない。病気になっても急激なものは少なく、長い時間かけて起こることになる。長寿の傾向。内臓では肝機能が中年以降弱くなる（若いときは強い）。若年期と中年期と体質が大きく変化する。
    辰: 全体に太りやすい。胃腸や消化器系に弱さがある。人生速度は遅いが、時に一気に進むことがあると、事のあとに極端な病気にかかることがある。瞬間的なエネルギーを使うようにはできていないので、慌しい環境の中では体調を崩す。
    巳: 体温が高く体力的に疲労度が大きい。短時間のうちにエネルギーの発揮が大きく、消耗もともなう。人生でも短距離向きで、ひとつひとつ区切りをつけるように生きることで安定を図ろうとする。背は高く大柄になることが多い。呼吸器が弱くなったり、ホルモンバランスの崩れや消化液などがアンバランスになりやすい。
    午: 体温が高く体力的に疲労度が大きい。短時間のうちにエネルギーの発揮が大きく、消耗もともなう。人生でも短距離向きで、ひとつひとつ区切りをつけるように生きることで安定を図ろうとする。背は高く大柄になることが多い。呼吸器が弱くなったり、ホルモンバランスの崩れや消化液などがアンバランスになりやすい。
