source_notes:
  title: 五行配当表の数理的解釈～健康を占う～
  material: materials/中国五行占術_算命学③回.md
  intro: |-
    五行配当表とは、もともと五行に割り当てられている、人間界の諸現象と諸形態です。人体から人徳、自然現象に至るまで、五行が変換されたものです。
    配当とは担当と同じ意味です。青い色は、人間界では木性の担当です。肺は金性が肺という臓器に変換されたものです。春には木性の気が強まり、秋には金性の気が強まるのが四季の五行です。暴飲暴食など生活習慣を別にして、臓器が病むのは、その気の不完全燃焼か、無理使いによるものです。宿命の火性の変調は心や小腸を痛め、土性が多い人は甘いものに反応しやすいなど、宿命五行と森羅万象に配当された五行とは連動します。
    占いでは、特に健康を占う時に、身体に配当された五行（五臓五腑）と宿命五行の数理法数値との関係を使います。健康を見るときには、肝臓・胆のう（木性）、心臓・小腸（火性）、胃腸・脾臓（土性）、肺・大腸（金性）、腎臓・膀胱（水性）、は陰陽の区別をしないで一緒のものとします。脾臓というのが聞きなれないと思いますが、胃腸の消化を助ける機能と考えてください。健康を占う時に注目するのは、宿命五行の数理法での最大値と最小値です。それと日干と生まれた季節との関係も考慮します。

    （五行配当表の中から健康及びラッキー要素を抜粋）
  principles: |-
    ①肉体の不調は、最大数値の五行の未使用による、病的燃焼。
    気は燃焼することで役割を果たします。代謝循環することで生命は稼働するのです。宿命で与えられた大きい気は、多く燃焼する必要があり、多い気を燃焼させることが宿命の役割を果たすことになります。ところが、なんらかの理由で多い気の燃焼ができなくなると、エネルギーは病気という形で燃焼しようとします。病気は単に気を病むだけでなく、それによって澱んだエネルギーを放出している意味もあります。
    若い時は活力もあるので、数値が大きい気はそれなりに燃焼されますが、年齢とともに活力は落ちてきて、思うような気の燃焼を起こすことができなくなります。数値の高い気ほど不完全燃焼の確率が高まる理屈になります。

    ②小さい気の無理使いは、身体にダメージと消耗を与える。
    ①の逆の現象です。過労や、方向の違うところで活躍してしまうと、小さい気の臓器がオーバーワークでエンジンストップします。これ以上は無理ということを、その気の臓器を病むことで本人に知らせるわけです。年をとってくると、小さい気を無理しないことは経験で身につけてくるので、小さい気の問題は若いときのほうが要注意です。方向も自覚も定まらない時の、無理使いによって、小さな気の臓器が悲鳴を上げることもあります。

    ③理屈では説明できないのですが、算命学では、もっとも大きな気とその人が誕生したときの12支（月支のこと）との関係で、健康状態を予測する秘伝的占術があります。

    ①②③をあわせて、健康占技として、これ以外の問題に関しては、生活習慣や過度のストレスなどに原因を求めるようにします。
  example: |-
    最大の気は、水性－腎臓・性機能・歯・髪・骨・泌尿器・耳・体内水分の調整
    最小の気は、金性－肺・大腸・鼻・汗腺の調節・皮膚・水分代謝

    若い時は最大の気は強い気になります。最小の気は無理使いすることもあるので、弱い気になります。ただ、晩年になってくると、最大気が不完全燃焼を起こしやすく、最大気のほうに問題が出ることが多くなります。数値の平均はひとつの気で20％です。

    例題は水性が35％で、やや高いと考えられます。金性は弱いですが、弱い気は無意識のうちに制御しています。また、運勢からのバックアップもあるので、それほど心配はいりません。
  dominant_intro: |-
    大気は宿命の数理法で一番大きい気（同点の場合は木火土金水木の順で下の気）。
    月支は生まれ月の12支（例題の場合は「午」）
    例題は一番大きい気が水性なので、大気･水性－月支・午を見ます。
  practice_note: |-
    実践ワンポイント・・この健康占技は当たるときはぴたりと当たりますが、外れも多いです。
    体型や血圧などは他の干支との関係もあって、一概にはいえないので、触れないほうが無難。
    それでも、他に類を見ない算命学独自の秘伝健康占技なので、五行のない気なども考え合わせて、複合的にとらえていくと、大いに役立つ占技となります。
