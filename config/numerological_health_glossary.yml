    亥: バランスが良く保たれている。頑健というわけではないが、ある一箇所のみが悪くなるということが少ない。弱さの連動という特徴があり、ひとつが悪くなるとそれにともなって、いろいろなところが連鎖的に悪くなる。よく言えば悪い状態の中である種のバランスが保たれることになり、決定的なダメージにはならずに、それなりの健康を保つことができる。まとめて病気をするという不思議な形を持っている。
  火:
    子: 骨に弱さが出る。全体に太りきれない体質。小さくバランスを保っている状態。強いて言えば、体の割りに手足が弱いこと。骨の弱さから来るのか、手足の動きが小さい。実際の生活では器用な形になる。
    丑: 皮膚に難点や弱さが出やすい。耐久性は弱さがある。脾臓やすい臓など体内の奥深い臓器が脆くなる恐れ。人生でも途中で挫折するような運命をつくりだしやすい。人生途上で運命的な苦難に出会うときはその原因の多くは健康上にある。
    寅: 太い血管の持ち主だが、血管の脆さも持っている。心臓に関する病気に注意。女性の場合は出産に関する諸症状に注意（他に金性があれば緩和される）。体内に強い熱量があるので、心理状態がどのようなものであれ、他人に見せる表情には常に明るさがある。体が明であれば気も明となる。ただ、体質の明は孤独質になる。
