    午: 体力や体質が年齢によって大きく変化する。若いときに虚弱で晩年は丈夫になるなど。肺や気管支などの呼吸器に弱さが出やすい。持久力はかなり強い。骨格と筋肉のバランスが悪くて、骨に弱さが出やすい。腰痛なども。視力も早いうちから弱くなり、眼も弱点となる。
    未: 小さい病気を起こしやすい。身体よりも、気持ちから病気になってしまう。虚弱じゃなくても用心深く健康を気にするようになる。耐久力は強い。消化器系（腸）に弱点が出やすい。排泄に関する部分も脆さが出そう。身体は強くても末端に弱さが出る。冷え性で、冷えから来る病気も。
    申: 体温の低さが特徴。血液そのものがさらさらしている。血液に粘りが足りない。体力はあるほうだが、長時間の無理がきかない。肉体よりも自律神経などの障害に合いやすく、物事を深く考えすぎての精神障害になることも。体質的にも表に現われる気的にも明るさがない。土性がある場合は視力障害に注意。すべからく体の冷えと神経の硬直に起因する。
    酉: 体温の低さが特徴。血液そのものがさらさらしている。血液に粘りが足りない。体力はあるほうだが、長時間の無理がきかない。肉体よりも自律神経などの障害に合いやすく、物事を深く考えすぎての精神障害になることも。体質的にも表に現われる気的にも明るさがない。土性がある場合は視力障害に注意。すべからく体の冷えと神経の硬直に起因する。
    戌: 小さい病気を起こしやすい。身体よりも、気持ちから病気になってしまう。虚弱じゃなくても用心深く健康を気にするようになる。耐久力は強い。消化器系（腸）に弱点が出やすい。排泄に関する部分も脆さが出そう。身体は強くても末端に弱さが出る。冷え性で、冷えから来る病気も。
    亥: 強健か虚弱かどちらかになる。平均的になりにくい。強健の場合は筋肉が引き締まり、体全体がばねのような弾力を持つ。虚弱だと大病でなくても常日頃から原因不明の脱力感に襲われる。明確ではないが弱さが出てくる。特に内臓に関して強健と虚弱の差が大きくなる。人生でも同様に成功する場合と不遇に終わる場合と極端に出る。
