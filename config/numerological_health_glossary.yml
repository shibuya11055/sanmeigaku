---
elements:
  木:
    label: 木性
    color: 青・緑
    direction: 東
    numbers: 3・8
    emotion: 怒
    foods: 青い野菜、酸味、漢方薬など
    organs: 肝臓、胆のう、目、筋肉、爪、気の流れ、自律神経
    risks: 張り、目の不調、肝胆系、自律神経、抑うつや倦怠感に注意。
    excess: 木性が大きい時は、伸びる力や守る力を使い切れないと、肝胆系・筋肉・目・自律神経に滞りが出やすい。
    deficiency: 木性が小さい時は、無理な我慢や方向違いの活動で、筋肉・目・気の巡りが消耗しやすい。
  火:
    label: 火性
    color: 赤
    direction: 南
    numbers: 2・7
    emotion: 喜
    foods: 赤色野菜、苦味、焼いた肉、酒類など
    organs: 心臓、小腸、血液、循環、舌、精神活動
    risks: 心臓、血液、動悸、冷え、舌や口内、精神活動の乱れに注意。
    excess: 火性が大きい時は、熱量や表現を燃焼できないと、循環器・血液・精神活動に熱がこもりやすい。
    deficiency: 火性が小さい時は、勢いや明るさを無理に出すことで、心身の熱量や循環が消耗しやすい。
  土:
    label: 土性
    color: 黄
    direction: 中央
    numbers: 5・0
    emotion: 思
    foods: 穀物、芋類、甘味、卵、乳製品など
    organs: 胃腸、脾臓、消化吸収、口、肌、筋肉
    risks: 胃腸、消化不良、食欲や味覚、太りやすさ、筋肉の萎縮に注意。
    excess: 土性が大きい時は、受け止める力や蓄積を使い切れないと、胃腸・脾臓・肌肉に重さが出やすい。
    deficiency: 土性が小さい時は、引き受け過ぎや生活基盤の乱れで、消化吸収や体力の土台が消耗しやすい。
  金:
    label: 金性
    color: 白
    direction: 西
    numbers: 4・9
    emotion: 悲
    foods: 白系野菜、鶏肉、辛味など
    organs: 肺、大腸、鼻、皮膚、汗腺、水分代謝
    risks: 呼吸器、皮膚、アレルギー、便通、鼻や声帯に注意。
    excess: 金性が大きい時は、整理・緊張・闘争の力を燃焼できないと、肺・大腸・皮膚・呼吸器に硬さが出やすい。
    deficiency: 金性が小さい時は、責任や勝負を無理に背負うことで、呼吸器・皮膚・大腸が消耗しやすい。
  水:
    label: 水性
    color: 黒
    direction: 北
    numbers: 1・6
    emotion: 恐
    foods: 黒い食べ物、豆類、海藻、魚介、塩味など
    organs: 腎臓、膀胱、排泄、耳、骨、髪、腰、体内水分
    risks: 腎臓、泌尿器、耳、骨、髪、腰、冷え、排泄関係に注意。
    excess: 水性が大きい時は、知恵や蓄えを流せないと、腎・膀胱・水分代謝・冷えに滞りが出やすい。
    deficiency: 水性が小さい時は、考え過ぎや休息不足で、腎気・腰・耳・体内水分が消耗しやすい。
dominant_branch_groups:
  木:
    子亥: バランスは保たれやすいが、一箇所だけでなく連動して弱さが出やすい。大きな崩れより、複数箇所が同時に重くなる傾向を見る。
    丑辰未戌: 胃腸・消化器系、太りやすさ、慌ただしい環境での体調崩れに注意。瞬間的に無理をすると反動が出やすい。
    寅卯: 筋肉・骨格・神経・筋など外側に出やすい。中年以降の肝機能、体質変化、長く続く不調を確認する。
    巳午: 体温が高く、短時間で大きく消耗しやすい。呼吸器、ホルモンバランス、消化液の乱れを確認する。
    申酉: 筋肉と筋のアンバランス、神経や平衡感覚、筋を傷める怪我に注意。細部の粗さが健康面にも出やすい。
  火:
    子亥: 骨や手足の弱さ、太りきれない体質を確認する。小さく器用に保つが、土台の弱さを見落とさない。
    丑辰未戌: 皮膚、耐久性、脾臓や膵臓など深い臓器に注意。人生上の苦難が健康負担として出ていないかを見る。
    寅卯: 血管・心臓・血液に注意。熱量は強いが、明るさの裏側に孤独や脆さが出ていないか確認する。
    巳: 体温は高く外見は強く見えやすいが、崩れると大きくなりやすい。血の濃さ、末端の冷え、皮膚の粗さを確認する。
    午: 体温は高く外見は強く見えやすいが、崩れると長引きやすい。血流、疲れやすさ、末端の冷えを確認する。
    申酉: 体調が不安定になりやすく、循環器や中心部の臓器に弱点が出やすい。太り始めを不調の前兆として見る。
  土:
    子亥: 体内の水が濁りやすく、熱や小さな不調が長引きやすい。下腹部、胃液・胆汁の偏り、頭痛傾向を確認する。
    丑辰未戌: 体質は頑健で持久力があるが、太りやすさ、血液や細胞の固まりやすさ、壮年以降の弱りに注意。
    寅卯: 痩せ型で変化しにくい体質になりやすい。持久力はあるが瞬発力は弱く、消化器の虚弱さを確認する。
    巳午: 毒素をためやすく皮膚表面に粗さが出やすい。生命力は強いが、内外の差を確認する。
    申酉: 回復は早く体質は強いが、太りにくく体温は低め。食の細さ、神経の張り詰め、血管の細さを確認する。
  金:
    子亥: 肉体が冷えやすく、骨格・筋肉・血液の弱さを確認する。貧血、低血圧、持久力の弱さに注意。
    丑辰未戌: 瞬間的な稼働力と回復力がある。内臓は丈夫でも、神経の張り詰めや低めの体温を確認する。
    寅卯: 肺・呼吸器に弱点が出やすい。呼吸器が強い場合も、肝臓など解毒機能の弱りを確認する。
    巳午: 年齢で体力や体質が大きく変化しやすい。手足や首のアンバランス、肺・気管支を確認する。
    申酉: 瞬間的に燃焼して、その後に強い疲労が出やすい。胸部・呼吸器の弱さ、外は強く内側が弱い状態を確認する。
  水:
    子亥: 強健か虚弱かに振れやすく、平均的になりにくい。内臓の強弱差、原因不明の脱力感を確認する。
    丑辰未戌: 小さな病気や気持ちからの不調に注意。消化器、排泄、末端の弱さ、冷えを確認する。
    寅卯: 体温は低めで寒暖差に敏感。水分・血液循環は良いが、土性が強い時の腎機能や視力を確認する。
    巳午: 年齢で体力や体質が変化しやすい。肺・気管支、骨格と筋肉のバランス、腰、視力を確認する。
    申酉: 体温が低く、血液に粘りが少ない傾向。長時間の無理、自律神経、考え過ぎ、冷えを確認する。
