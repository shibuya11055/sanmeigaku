    丑: 瞬間的にエネルギーを燃焼させる特色がある。ある一定の時間内は休みなく肉体の稼動が可能。疲労の回復が早くて、内蔵が丈夫。酒にも強い。安定した血圧を長く維持できる。体温は低め。体格は大柄にはならない。仕事のみに生きがいを感じるような人生になり、動いているときのほうが心の安定を得られる。常に神経が張り詰めているので、神経に弱点が出ることも。
