  土:
    子: 体の水が濁りやすい。いったん熱が出るとなかなか下がり難かったり小さな病気でも治り難く長引く傾向になる。下腹などの下半身に弱さが出る。胃液や胆汁なども多すぎたり少なすぎたり偏りやすい。また、火性がないと頭痛持ちになることも。
    丑: 身長は伸び難く、太りやすい。体質は頑健で持久力耐久力はかなりある。手足も丈夫。ある種の塊ができやすい。血液や細胞が固まりやすく、体内の流通を悪くする。若いときは丈夫で元気。壮年期に入るとあちこち弱さが出てくる。性格的にも表面柔らかく、中身に頑固さを持つようになる。人生は階段式に登りつめて行く。
    寅: 火性と水性がなければ生涯を通じて体型が痩せ身で変化し難い。持久力、耐久力を持ち、瞬間的なパワーはなくてもある一定量が同じ速度で現われる。全体から見ると消化器に虚弱さが見られる。
