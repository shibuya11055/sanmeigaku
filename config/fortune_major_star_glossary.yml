貫索星:
  keywords: マイペース・独立心・頑固・守り
  key_people: 自分自身・兄弟
  fortune_place_people: 仕事関係者・学友
  short: 自分の軸を立て、新しいスタートや独立性がテーマになりやすい年。
  detail: |-
    これまでの経験をもとに、自分らしい方向へ踏み出したくなる運勢です。頑張った分だけ成果につながりやすい一方、頑固さや視野の狭さも出やすくなります。
    信頼できる人の意見を聞きながら、自分の守るべきものと変えるべきものを見極める視点が大切です。
  void_short: 自分を過大評価しやすく、独立や方向転換を急ぎたくなる年。
  void_detail: |-
    天中殺時は「自分で変えたい」という衝動が強くなりやすいものの、新しい独立・自営・大きな方向転換は後の負担になりやすい時期です。
    外側を大きく変えるより、家庭や身近な支援者など内側の安定を保つことを優先します。

石門星:
  keywords: 協調・集団・社交性・説得力
  key_people: 仲間・兄弟・友人
  fortune_place_people: 仕事関係者・学友
  short: 人間関係が広がり、仲間や組織との関わりから運が生まれやすい年。
  detail: |-
    友人、職場仲間、恋人など、人とのつながりから展開が生まれます。仲間作りやグループ活動に向き、人脈を活かして前進しやすい時です。
    今年親しくなる相手は縁が深まる可能性があるため、関係性の質を見ていきます。
  void_short: 人間関係が変化し、孤独感や焦りが出やすい年。
  void_detail: |-
    天中殺時は、長く続いた付き合いが疎遠になったり、他人の厄介ごとを引き受けて疲弊したりしやすくなります。
    勝負事や安請け合いを避け、関係の変化を無理に埋めようとしない姿勢が必要です。

調舒星:
  keywords: 感性・情愛・表現・孤独
  key_people: 子供・目下・後輩
  fortune_place_people: 子供・後輩・目下
  short: 感受性が高まり、内省・表現・特定の人との深い交流がテーマになりやすい年。
  detail: |-
    孤独感や人恋しさが増す一方、大勢の中より静かな環境で自分の生き方を見直すことに向きます。
    趣味、芸術、表現活動に良さが出やすく、子供や目下との関わりも増えやすい時期です。
  void_short: 感情が傷つきやすく、怪我・病気・舌禍に注意が必要な年。
  void_detail: |-
    天中殺時は、大切なものを傷つける現象や、些細な会話からのトラブルが出やすくなります。
    新しい人間関係を広げるより、ひとつの趣味や内面的なテーマに集中して過ごすことが助けになります。

鳳閣星:
  keywords: 自然体・遊び・表現・リラックス
  key_people: 子供・目下・後輩
  fortune_place_people: 子供・後輩・目下
  short: 遊びや自然体の中からヒントが生まれ、目下との縁も深まりやすい年。
  detail: |-
    イベント、会食、趣味、自然に触れる時間など、緊張をほどく場面から運が動きます。
    無理に急がず、リラックスして過ごすことで発想や人脈が広がり、表現活動にも評価が生まれやすい時です。
  void_short: 過去の行動が問われ、不安感や疑心暗鬼が出やすい年。
  void_detail: |-
    天中殺時は、以前の行為が現在の変動として表れたり、理由のない不安から人を疑いやすくなります。
    家族など身近な人の忠告を聞き、派手に動くより気持ちを整えることを重視します。

司禄星:
  keywords: 堅実・安定・準備・蓄積
  key_people: 家族・配偶者・補佐役
  fortune_place_people: 自分自身
  short: 地道な努力の結果が表れ、生活基盤や将来準備を整えやすい年。
  detail: |-
    蓄財、計画、情報収集、生活基盤の見直しに向きます。未婚なら家庭願望、既婚なら家族の団結がテーマになりやすい時です。
    大きく跳ぶより、目の前のことを丁寧に積み上げるほど安定につながります。
  void_short: 積み重ねてきたものが崩れやすく、疲れた時の判断に注意する年。
  void_detail: |-
    天中殺時は、人間関係、財、仕事の手順、準備してきたものにほころびが出やすくなります。
    小手先の対処や強引な決断は避け、混乱している時ほど考え込まず自然体で整えることが大切です。

禄存星:
  keywords: 魅力・愛情・財・奉仕
  key_people: 恋人・配偶者・異性全般
  fortune_place_people: 自分自身
  short: 恋愛・財・奉仕の動きが強まり、人やお金を引き寄せやすい年。
  detail: |-
    積極性と魅力が増し、異性縁や財の動きが活発になります。出費も増えやすいため、交際費や投資の扱いには意識が必要です。
    見返りを求めない奉仕や、人を喜ばせる行動が運を伸ばします。
  void_short: 愛情や財の欠落、信用低下に注意が必要な年。
  void_detail: |-
    天中殺時は、愛する人との別れ、金銭的損失、信用の低下が出やすくなります。
    お金や策で解決しようとすると逆効果になりやすいため、相手の気持ちを理解する姿勢と時間をかけた対応が重要です。

牽牛星:
  keywords: 責任・名誉・自尊心・協調
  key_people: 配偶者・恋人・異性・補佐役
  fortune_place_people: 配偶者・補佐役
  short: 社会的な責任や評価がテーマになり、役割を引き受けやすい年。
  detail: |-
    才能を認められたり、責任ある立場を得たり、目上から引き上げられやすい運勢です。
    プライドや見栄も出やすいため、協調の中で自己主張するバランスが問われます。
  void_short: 名誉やプライドが傷つきやすく、誠実な対応が必要な年。
  void_detail: |-
    天中殺時は、自分に覚えがなくても名誉を汚されるような現象が起きやすくなります。
    苦しくても誠実に対処し、プライドによる自己主張を控えることが助けになります。

車騎星:
  keywords: 行動力・闘い・スピード・自己犠牲
  key_people: 恋人・異性・他人
  fortune_place_people: 配偶者・補佐役
  short: 行動力が増し、忙しさや挑戦の中で運が動きやすい年。
  detail: |-
    考えるより動くことで答えを出しやすく、スピード感とチャレンジ精神が強まります。
    動くほどチャンスは広がりますが、行き過ぎると人とぶつかりやすいため、人のために動く姿勢が運を上げます。
  void_short: 争いや事故、知性を欠いた行動に注意が必要な年。
  void_detail: |-
    天中殺時は、感情的な衝突や不注意による怪我・事故が起きやすくなります。
    義のない争いを避け、信頼できる人の冷静な意見を聞くことが重要です。

玉堂星:
  keywords: 学習・伝統・保守・目上運
  key_people: 母親・目上・上司・先生
  fortune_place_people: 親・目上・上司
  short: 学びや目上からの導きがテーマになり、落ち着きが出やすい年。
  detail: |-
    古典、伝統、資格、習い事など、学習に向く運勢です。母親や目上との縁も深まり、助言や導きによって安定しやすくなります。
    動く前に学ぶ、過去から学ぶという姿勢が運を整えます。
  void_short: 人生観が変わりやすく、精神面の変化が大きい年。
  void_detail: |-
    天中殺時は、これまで知らなかった世界を知る一方、人生観や目上との関係が大きく変わりやすくなります。
    気持ちが変わっても大きな行動に移さなければ、学びとして活かしやすい時です。

龍高星:
  keywords: 変化・改革・好奇心・自由
  key_people: 目上・親・上司・先生・外国人
  fortune_place_people: 親・目上・上司
  short: 環境や人間関係を変え、新しい自分を作る動きが出やすい年。
  detail: |-
    好奇心や知識欲が強まり、移動、改革、環境変化が起こりやすい運勢です。
    色あせた関係に区切りがついたり、離別・離郷・旅行などを通じて新しい視点を得ることがあります。
  void_short: 運命の曲がり角になりやすく、変化を急ぎすぎないことが大切な年。
  void_detail: |-
    天中殺時は、身の回りの環境や人間関係に衝撃的な変化が起こりやすくなります。
    やってくる変化は受け止めつつ、職業や住居など大きな変更は天中殺明けに検討する視点が必要です。
