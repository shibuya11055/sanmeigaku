# 年運・大運の位相を、日支/月支/年支の場所別に読むための辞書。
# materials の原文は転載せず、鑑定画面向けに要約・再編集している。

干合:
  short: 変化や結びつきが生まれ、普段と違う力を出しやすい。
  detail: |-
    干合は支の位相ではありませんが、運勢では重要な変化要素として扱います。人や物事との結びつきが強まり、危機や追い込まれた状況をきっかけに、普段とは違う力を出すことがあります。
    一方で、恋愛や配偶者干の問題、気持ちの入り込みすぎ、干合が重なりすぎることによる精神面の不安定さも確認します。日支・月支・年支の位相と合わせて、結びつきが安定へ向かうのか、散法と重なって混乱するのかを見ます。
  positions:
    day:
      short: 家庭や私生活で関係性が変化し、身近な人との結びつきから新しい動きが生まれやすい。
      detail: |-
        日干支まわりの干合は、恋愛・配偶者・身近な関係の動きとして出やすい配置です。日支側に散法が重なる場合は、結びつきがそのまま安定になるとは限らず、恋愛トラブルや家庭内の混乱として出ることもあります。
        その年に何が強く結びつこうとしているのか、家庭や私生活で無理な一体化が起きていないかを確認します。関係性を変える年として読めますが、気持ちだけで大きく動かず、日支の位相で現実の受け皿を見ます。
    month:
      short: 心の向きが変わりやすく、考え方や気分に普段と違う転換が起こりやすい。
      detail: |-
        月干との干合は、心が相手や対象に入り込みやすい年として見ます。印象に残る恋愛、忘れにくい関係、気持ちの深い結びつきが生まれることがあります。
        ただし、入り込みが強いほど判断も偏りやすくなります。月支の位相が害・刑・冲などなら、心の混乱や思い込みが強くならないかを重点的に確認します。
    year:
      short: 仕事や社会面で関係性が変化し、協力や役割の変化から展開が生まれやすい。
      detail: |-
        年干との干合は、仕事・社会・外側の人間関係での結びつきや役割変化として表れます。協力者が出る、立場が変わる、社会的な関係の中で別の力を求められる、といった読みになります。
        危機管理構造として働くこともあるため、仕事上の難題や責任がきっかけで変化する場合もあります。年支の位相が整っていれば協力関係に、散法が強ければ対人や契約の混乱に注意します。

半会:
  short: 異質なものがまとまり、広がりや発展が生まれやすい。
  detail: |-
    運勢の半会は、盛り上がり、拡大、発展として読みます。土性を含む半会なら現実的な盛り上がり、土性を含まない半会なら精神的な盛り上がりが強くなります。
    合法なのでスムーズに見えやすい年ですが、何が盛り上がるかは主星・従星・場所によって変わります。家庭なのか、心なのか、仕事なのかを分けて確認します。
  positions:
    day:
      short: 家庭や結果がまとまりやすく、願い事や生活上の成果が形になりやすい。
      detail: |-
        日支の半会は、家庭や私生活のまとまり、これまで進めてきたことの結果が形になる年として読みます。結果オーライになりやすく、願い事や生活上の課題がまとまる方向へ向かいます。
        主星の意味も拡大しやすく、禄存星なら愛情や財、車騎星なら忙しさや行動力など、その年のテーマが家庭・結果の場所で広がります。良い結果を焦って取りに行くより、まとまり始めた流れを活かします。
    month:
      short: 心が広がり、成長感や充実感が出やすい。
      detail: |-
        月支の半会は、心が広がり、気持ちの盛り上がりや人間的な成長として出ます。やる気、充実感、視野の広がりがあり、主星の方向へ気持ちが伸びやすくなります。
        日支や年支に散法がある場合は、試練や現実の揺れを通して心が大きくなる年とも読めます。単に楽な年ではなく、経験を取り込んでスケールを広げる年です。
    year:
      short: 仕事や人間関係が広がり、発展的な前進が起こりやすい。
      detail: |-
        年支の半会は、仕事・社会・学校での広がりと発展を表します。人間関係が広がり、ひとつの仕事だけでなく複数の展開へ進みやすい年です。
        行動力も高まりやすく、貫索星なら単独での前進、石門星なら仲間と進む力、禄存星なら事業や財の拡大など、主星と合わせて読みます。勢いが出るため、準備不足のまま広げすぎない確認も必要です。

大半会:
  short: 半会の発展力に干の一致が加わり、勢いがさらに強まる。
  detail: |-
    大半会は半会の発展力に精神面の一致が加わる特殊な合法です。飛躍や大きな発展につながりやすい一方、気持ちが大きくなりすぎ、頑固さ、過信、ワンマンさが出やすい点も見ます。
    宿命の位相とのバランスが重要です。年運では大きな推進力になりますが、勢いが強いほど、着地先と現実の器を確認する必要があります。
  positions:
    day:
      short: 家庭や結果に強いまとまりが出て、大きな成果や願望成就につながりやすい。
      detail: |-
        日支の大半会は、家庭・私生活・結果の場所に強い求心力が生まれる年です。自分を中心に周囲を巻き込み、成果や生活上のまとまりを大きく作る力があります。
        ただし、独立心や自力感が強くなりすぎ、家族や近い人を自分のペースに巻き込むことがあります。結果を出せる年ですが、過信と強引さには注意します。
    month:
      short: 心の広がりが強く、成長意欲や充実感が大きくなりやすい。
      detail: |-
        月支の大半会は、気持ちがひとつの方向へ大きく膨らむ年です。夢、希望、やる気が強まり、自分の気持ちに忠実になりやすくなります。
        年運では前向きに使いやすい一方、気持ちが舞い上がる、視野が狭くなる、現実の限界を見落とす危険もあります。心の盛り上がりを現実の計画に落とせるかを確認します。
    year:
      short: 仕事や社会面で発展力が強まり、周囲を巻き込んで前進しやすい。
      detail: |-
        年支の大半会は、仕事・社会面で最も使いやすい大きな前進運です。干も支もつながるため、目標に対する粘りが出て、困難があっても簡単には諦めにくくなります。
        周囲を巻き込む発展、独立、事業展開、仲間との前進など、主星の意味を強く押し出します。勢いが強い分、拡大しすぎて空中分解しないよう、現実の器と協力者の状態を見ます。

支合:
  short: 狭い範囲でしっかり結びつき、こだわりが強まりやすい。
  detail: |-
    支合は気持ちと現実が一致し、小さく堅くまとまる運勢です。広く拡大する半会と違い、好きなもの、譲れないもの、こだわりのある範囲へ意識が集中します。
    堅実な合法ですが、現実が自分の気持ちとずれると我慢できなくなり、波乱を生むこともあります。大運では特に、合わない現実を修正する力として出やすくなります。
  positions:
    day:
      short: 家庭や私生活で親密な環境を作りやすく、生活上の好みやこだわりが強まりやすい。
      detail: |-
        日支の支合は、家庭や私生活で「この形がよい」という好みがはっきりする年です。内側の生活、夫婦関係、家族関係、生活スタイルにこだわりが出ます。
        まとまる力はありますが、狭い範囲での満足を求めるため、許容範囲は広くありません。司禄星や牽牛星が絡むと夫婦・家庭への期待が強まり、良くまとまるか、期待が外れて争うかの差が出やすくなります。
    month:
      short: 好き嫌いや信念がはっきりし、心の中で譲れないものが出やすい。
      detail: |-
        月支の支合は、心のこだわり、好き嫌い、信念がはっきりする年です。高望みというより、心が向くものに集中し、嫌なことを無理に続けにくくなります。
        好きなことができていれば安定しますが、気持ちに反する現実が続くとストレスが強くなります。人間関係でも、合う人と合わない人の差が出やすい年です。
    year:
      short: 好きな仕事や活動に向かいやすい一方、思い通りに進まないと負担が出やすい。
      detail: |-
        年支の支合は、好きな仕事、やりたい活動、自分の気持ちに合う社会的役割へ向かう年です。仕事が本心に合っているかを測る一年になります。
        大運のような長い期間では、合わない仕事を続けにくくなり、試行錯誤の末に好きな仕事へ近づくことがあります。年運では現状確認の意味が強く、思い通りに進まない点がストレスとして見えます。

方三位:
  short: 季節の気が穏やかに広がり、自然な拡大が起こりやすい。
  detail: |-
    方三位は、運勢では大きな衝撃よりも穏やかな広がりとして読みます。宿命に準方三位があり、運勢でそろう場合などに成立し、これまでの流れを無理なく広げる働きがあります。
    強烈な発展ではありませんが、違和感の少ない安定と横広がりがあります。庶民的、日常的、地域的な広がりや、人づての展開として使いやすい運勢です。
  positions:
    day:
      short: 家庭や生活環境が自然に安定し、無理なく整いやすい。
      detail: |-
        日支の方三位は、家庭や私生活が自然に安定し、生活環境が無理なく広がる年です。大きく変えるより、今ある環境を穏やかに整える力として見ます。
        私生活の範囲を少し広げる、家族や身近な人との日常を安定させる、生活のリズムを自然に拡張する、といった読みになります。
    month:
      short: 心の状態が穏やかに広がり、気持ちを整えやすい。
      detail: |-
        月支の方三位は、心に大きな違和感が少なく、自然な納得感が出やすい年です。刺激は強くありませんが、気持ちが穏やかに広がります。
        自分の気持ちに無理が少ないため、学びや人間関係も自然に取り込めます。大きな決断より、心の基盤を整える一年として読みます。
    year:
      short: 仕事や社会面で、これまでの流れが無理なく広がりやすい。
      detail: |-
        年支の方三位は、仕事や社会面でこれまでの流れを維持しながら少しずつ広げる年です。急成長よりも、横への広がり、口コミ、地域性、日常的な信頼の積み上げに向きます。
        新規開拓でも派手さより安定感が出ます。大衆的な商売や、人との自然なつながりで広げる仕事では使いやすい運勢です。

冲:
  short: 減速、分断、方向転換、変化が起こりやすい。
  detail: |-
    運勢の冲は、勢いを削ぎ、分断し、方向転換を促す散法です。半会の反対に近く、広げるよりも見直す、分ける、部分的に処理する年になります。
    順調な流れにはブレーキとして出ますが、低迷していたものを壊して新しい流れへ移すこともあります。大きくまとめるより、慎重に細かく対処します。
  positions:
    day:
      short: 家庭や私生活で変化が起こりやすく、自立、転居、関係の見直しなどがテーマになりやすい。
      detail: |-
        日支の冲は、私生活や家庭で壁に当たり、これまでの流れをそのまま続けにくくなる年です。自立、転居、離別、生活環境の変更などとして出ることがあります。
        まとまっていたものが分かれるため、落ち着きにくく、細かい問題や神経疲れも出やすくなります。変化を無理に起こすのではなく、変わらざるを得ない部分を整理する年です。
    month:
      short: 心の中で迷いや方向転換が起こりやすく、考え方が変わりやすい。
      detail: |-
        月支の冲は、心が分断されやすく、考え方や精神状態が変わる年です。迷い、内省、過去の自分の見直しが増え、派手な発想より地味で慎重な思考になりやすいです。
        家系や過去の考え方から離れるような体験として出ることもあります。調舒星など感情性の強い主星と重なると、不安定さや迷いを丁寧に扱う必要があります。
    year:
      short: 仕事や社会面で勢いが落ち、転職、退職、役割変更など流れの変化が起こりやすい。
      detail: |-
        年支の冲は、仕事・社会・学校で勢いが減速し、壁や方向転換が出やすい年です。年運だけでは即転職とは限りませんが、迷い、別方向の模索、役割変更、退職や転職の検討につながることがあります。
        行動は慎重になり、方向感がつかみにくくなります。入力系の主星なら情報収集、禄存星なら分散やサービス過多など、主星の出方も変化として読みます。

害:
  short: 外から来る現実を受け入れる必要があり、無理に逆らうと負担が出やすい。
  detail: |-
    害は、外から押し寄せる現実を選別しにくく、受け入れざるを得ない運勢です。自分の意志を押し通そうとすると裏目に出やすく、ストレス、傷つき、健康面の負担として出ることがあります。
    一方で、受け身で学ぶ、指導を受ける、奉仕する、人に従って力を伸ばす場面では効用があります。後のプラスのために忍耐と奉仕で過ごす年として読みます。
  positions:
    day:
      short: 家庭や結果に負担が出やすく、過去の積み重ねが表面化することがあります。受け身で整える姿勢が鍵になります。
      detail: |-
        日支の害は、家庭、私生活、結果の場所が病むように見える年です。家族の不調、家庭内の負担、過去に積み重なった問題の露呈、思い通りの生活環境を作れない感覚として出ることがあります。
        主星によって対象は変わり、玉堂星なら母親や目上、司禄星なら家庭、鳳閣星・調舒星なら本人の健康面なども確認します。結果に執着せず、家族や生活に奉仕して整える姿勢が大切です。
    month:
      short: 意に沿わないことが心に入り込みやすく、ストレスや内的葛藤が強まりやすい。
      detail: |-
        月支の害は、心に好まないものが入り込みやすい年です。自分を通そうとすると精神的な負担が増え、ストレス、傷つき、悩みの多さとして出ます。
        ただし、欲や我が削られ、鍛えられる面もあります。受け入れにくい現実をどう扱うかがテーマになり、無理に反発するより、心の負担を小さくする環境調整が必要です。
    year:
      short: 仕事や社会で受け身の対応が増えやすく、奉仕的に引き受ける姿勢が求められやすい。
      detail: |-
        年支の害は、仕事、社会、前進力が病みやすい年です。意志に反する仕事、押し寄せる依頼、望まない環境変化が入り込み、前に出たい本性が強い人ほど負担を感じやすくなります。
        一方で、指導を受ける、決められたことを習得する、人のために働く場面では吸収力が高まります。受け身で引き受け、奉仕的に周囲へ尽くすことが対処になります。

刑:
  short: 気持ちが尖り、強い意志や調整力が出る一方で争いに注意が必要。
  detail: |-
    刑は争いと調整の位相です。運勢に押される面はありますが、害のような完全な受け身ではなく、自分の行動や主張が争いを作るため、選択の余地があります。
    気持ちは強くなり、調整力も出ます。天貴刑、旺気刑、庫気刑などの性質や主星との組み合わせにより、目下への圧、爆発的な怒り、正論による対立などとして出方が変わります。
  positions:
    day:
      short: 家庭や私生活で自己主張が強まり、身近な関係で争いが出やすい。
      detail: |-
        日支の刑は、家庭や私生活で争いが出やすい年です。私生活では自制が弱くなりやすく、気持ちの尖りがそのまま近い人へ向かうことがあります。
        生家にいる場合は親との争い、家庭がある場合は家族間の主張のぶつかりなどを確認します。前向きな気持ちや調整力として使えるか、単なる争いになるかを見ます。
    month:
      short: 心の中の戦いが強まり、葛藤や焦りを抱えやすい。
      detail: |-
        月支の刑は、心の中の戦いとして出ます。苛立ち、焦り、とげとげしさ、自制心との葛藤が強くなりやすい年です。
        表に出れば対人の争いにもなりますが、基本は内的葛藤の大きさとして読みます。自分の正しさや怒りをどう扱うか、主星が争いを助長していないかを確認します。
    year:
      short: 仕事や社会で主張が強くなり、職場や学校での争いに注意が必要。
      detail: |-
        年支の刑は、仕事・社会・学校での争いとして出ます。社会の場では自制も働くため、最初から衝突するとは限りませんが、均衡が崩れると行動力を伴った大きな争いになることがあります。
        宿命に合法が多い人は勢いのある争いになりやすく、宿命に散法が多い人は長引く陰気な戦いになりやすい傾向も見ます。距離感と調整役を意識する年です。

破:
  short: これまでの形にひびが入り、修復や移行が起こりやすい。
  detail: |-
    破は軽く見られがちな散法ですが、運勢では「ひび割れ」から新しい形を作る位相として扱います。害や刑が重なると破れ方が強くなります。
    年運では大きく出ないこともありますが、大運では破れ目から新しい自分や環境が生じることがあります。壊すだけでなく、修復や移行の方向を見つけることが大切です。
  positions:
    day:
      short: 私生活や家庭の形に小さな亀裂や模様替えのような変化が出やすい。
      detail: |-
        日支の破は、家庭や私生活にひび割れが出る年です。すぐに大きな波乱とは限りませんが、違和感や小さな亀裂が見え、修復や形の変更が必要になります。
        部屋の模様替えのように新しい形へ整える場合もあれば、亀裂を広げて抜本的に手を入れる場合もあります。変化の方向を見つけられないと、まとまりのなさとして残ります。
    month:
      short: 心にひびが入りやすい一方、ストレスの後に新しい考え方が生まれやすい。
      detail: |-
        月支の破は、心にひびが入る年です。ストレスや違和感を通して、これまでとは違う考え方が生まれやすくなります。
        破れっぱなしになるか、修復して新しい自分を見つけるかが分かれ目です。感情だけで結論を出さず、何を変えれば気持ちが整うのかを見ます。
    year:
      short: 仕事上のやり方に亀裂が入り、修復や新しい方向への移行がテーマになりやすい。
      detail: |-
        年支の破は、仕事・社会面で亀裂が見える年です。思い通りに進まない部分が出るため、工夫、改革、やり方の変更が必要になります。
        入力系の主星なら新しい知識や学習で乗り越え、禄存星ならサービスや調整で破れ目をふさぐなど、主星を使って修復の方向を探します。

天剋地冲:
  short: 精神面と現実面の両方で大きな転換が起こりやすい。
  detail: |-
    天剋地冲は、干の激しい剋と支の冲が重なる特殊な散法です。精神と現実の両方が揺れ、人生の曲がり角として出やすい強い変化運です。
    善悪ではなく、これまでの流れが大きく変わる年として読みます。特に日干支・年干支で出る場合は、生活や仕事の現実的なドラマを伴いやすくなります。
  positions:
    day:
      short: 家庭や私生活の土台が大きく変わりやすく、生活環境や関係性の転換点になりやすい。
      detail: |-
        日干支の天剋地冲は、生活環境や蓄積してきた過去が大きく変わる年です。家庭、私生活、結果の場所が揺れ、これまでの流れも考え方も変わることがあります。
        壊れる要素を含むため、大きな出来事として出ることもあります。単に悪いと見るのではなく、何が古い形を終え、どの現実へ移るのかを確認します。
    month:
      short: 心の持ち方が大きく揺れ、価値観や考え方を作り替えるような年になりやすい。
      detail: |-
        月干支の天剋地冲は、現実よりも考え方や心の持ち方の変化として出やすい年です。価値観が変わる、立場や地位の感じ方が変わる、内面で大きな転換が起こることがあります。
        現象は日支・年支ほど目立たない場合もありますが、心の土台が変わるため、他の位相や主星と合わせて精神面の負担を確認します。
    year:
      short: 仕事や社会面で大きな方向転換が起こりやすく、退職、転職、役割変更などを慎重に見ます。
      detail: |-
        年干支の天剋地冲は、仕事・社会生活の流れが大きく変わる年です。単なる変化よりもドラマチックで、転職、退職、職種変更、社会的役割の転換として出ることがあります。
        まったく違う方向へ移ることもあるため、年支の他の位相、主星、天中殺の有無を合わせて、衝動的な変化か、避けられない転換かを見分けます。

律音:
  short: 宿命と同じ干支が巡り、新しい要素が加わりやすい。
  detail: |-
    律音は、宿命の干支と運勢の干支が同じになる特殊位相です。大きく膨張するというより、同じ支が重なってその場所の意味が強くなり、新しいものが一つ加わると読みます。
    年運では60年に一度の日干支律音のように、人生の節目になることがあります。成人前の大運では反抗性として出る占技もありますが、年運では場所別の追加要素を中心に見ます。
  positions:
    day:
      short: 家庭や私生活に新しい環境や人間関係が加わりやすい。
      detail: |-
        日支の律音は、家庭や私生活に新しい要素が加わる年です。新しい生活環境、身近な人間関係、居場所、結婚・同居・引越しなど、内側の世界にプラスワンが起こりやすくなります。
        その追加が安定を生むか負担になるかは、主星と他の位相で見ます。生活の中に何が増えたのかを確認します。
    month:
      short: 心の中に新しい気持ちや関心が加わり、内面の分岐点になりやすい。
      detail: |-
        月支の律音は、心の場所に同じ支が重なるため、新しい気持ち、関心、価値観が加わる年です。内面の分岐点になり、これまでの自分にもう一つの見方が加わることがあります。
        他の散法が強い場合は、心の追加要素が迷いや葛藤になることもあります。何が気持ちに加わったのか、育てるべきものかを見ます。
    year:
      short: 仕事や社会面で新しい役割や活動の場が加わりやすい。
      detail: |-
        年支の律音は、仕事・社会・学校に新しい場や役割が加わる年です。新しい仕事、兼任、別の活動場所、学生なら学校外の学びなど、社会的な場所が増える読みになります。
        大きな飛躍ではありませんが、節目や分岐点になります。増えた役割が本業と調和するか、負担を増やすだけかを確認します。

納音:
  short: 干が同じで支が反対になり、大きな転換や組み直しが起こりやすい。
  detail: |-
    納音は、同じ干で支が冲になる強い特殊散法です。分裂や分壊のあとに違う形へ納まるという意味を持ち、大きな方向転換、因縁の整理、過去からの流れの組み直しとして読みます。
    対冲より強く、変化には困難やトラブルを伴うことがあります。ただ壊れるだけでなく、新しい局面へ納め直す努力と忍耐が重要です。
  positions:
    day:
      short: 家庭や私生活で大きな方向転換が起こりやすく、過去の流れを整理する年になりやすい。
      detail: |-
        日干支の納音は、60年に一度の大きな方向転換として出ることがあり、私生活や家庭、これまでの結果を組み直す年になります。過去の因縁を切り替えるような体験として読むこともあります。
        生活の土台が分かれたり壊れたりしても、そこから別の形へ納める力があります。焦って元に戻すより、何を終わらせ、何を新しい形にするかを見ます。
    month:
      short: 心の方向が変わりやすく、考え方や家系的なテーマを見直す年になりやすい。
      detail: |-
        月干支の納音は、心の持ち方や考え方の方向転換として出ます。家系や過去から受け継いだ考え方を整理し、自分の運命を歩く契機になることもあります。
        内面の分裂感や迷いがあっても、それは新しい心の形へ納め直す過程として読みます。月支の他の位相と合わせて、精神面の負担を見ます。
    year:
      short: 仕事や社会面で大きな転換期になりやすく、転職、独立、退職などの判断を慎重に扱います。
      detail: |-
        年干支の納音は、仕事・社会・学校で大きな方向転換が起こりやすい年です。転職、独立、退職、進路変更、転校など、これまでの歩みと違う方向へ向かうことがあります。
        誰にでも30歳前後で巡りやすい節目としても見ます。困難があっても、まとめ直す努力によって次の局面を作る年です。

同:
  short: 同じ支が重なり、新しい要素がひとつ加わりやすい。
  detail: |-
    同は、自刑に該当しない同じ支の重なりです。自刑に似たプラスワンの意味を持ちますが、迷いや葛藤よりも「新しいものが加わる」現象を中心に読みます。
    どの場所で同が起こるかにより、生活、心、仕事のどこに新しい要素が加わるかを見ます。主星と合わせると、加わる人物やテーマが具体化します。
  positions:
    day:
      short: 新しい生活環境や身近な人間関係が加わりやすく、結婚、引越し、自立などを見ます。
      detail: |-
        日支の同は、家庭や私生活に新しい環境が加わる年です。自立、同居、結婚、離婚、引越し、単身赴任、新しい行きつけの場所など、生活の場が一つ増えるように読めます。
        身近な人間関係、特に目下や後輩的な存在が増えることもあります。何が生活に追加されたかを確認します。
    month:
      short: 心の中に新しい関心や選択肢が加わり、自分の内面を見直しやすい。
      detail: |-
        月支の同は、心の場所に新しい関心や気持ちが加わる年です。大運では構造上出にくいとされますが、年運や月運では内面のプラスワンとして読みます。
        迷いというより、新しい見方や選択肢が増える状態です。主星のテーマに沿って、何へ心が向き始めたかを確認します。
    year:
      short: 新しい仕事環境や社会的な場が加わりやすく、活動場所が増えやすい。
      detail: |-
        年支の同は、仕事・社会・学校に新しい場が加わる年です。新しい職場、兼業、習い事、学校外の活動、海外出張など、社会的な活動場所が二つになるような読みになります。
        転職そのものより、社会の場が増えるニュアンスが強くなります。増えた場所が本人の主星テーマと合っているかを見ます。

自刑:
  short: 同じ支が重なり、追加される要素に迷いや葛藤が加わりやすい。
  detail: |-
    自刑は同じ支の重なりのうち、辰・午・酉・亥などで起こる内的葛藤を伴う位相です。運勢では同と同じくプラスワンの現象がありますが、そこに選択の迷い、偏れなさ、客観性が加わります。
    何かが増えるだけでなく、どちらを選ぶか、どう調整するかで迷いやすい年です。争いよりも、自分の中の葛藤として丁寧に見ます。
  positions:
    day:
      short: 家庭や私生活に新しい環境が加わりやすい一方、選択や関係性に迷いが出やすい。
      detail: |-
        日支の自刑は、家庭や私生活に新しい環境が加わりつつ、その扱いに迷いが出やすい年です。自立、結婚、離婚、引越しなどの生活変化に、選択の葛藤が伴います。
        家庭や結果を一つにまとめたい気持ちがありながら、客観的に見てしまい決めきれないこともあります。生活の追加要素と迷いの両方を見ます。
    month:
      short: 心の中で迷いや葛藤が強まりやすく、どちらにも偏れない感覚が出やすい。
      detail: |-
        月支の自刑は、心の中でどちらにも偏れない迷いが出やすい年です。内的葛藤は強まりますが、その分、主観に流されない観察力や客観性も働きます。
        月支の自刑は運勢の種類によって出方に注意が必要ですが、出た場合は心の分裂ではなく、偏れないからこそ冷静に見る力として扱います。
    year:
      short: 仕事や社会面で新しい場や役割が加わりやすく、どちらを選ぶか迷いやすい。
      detail: |-
        年支の自刑は、仕事・社会面で新しい場や役割が加わり、選択に迷う年です。転職、兼任、長期出張、二つの社会的場所などがテーマになりやすくなります。
        仕事と結果を一致させたい気持ちがありながら、客観的なバランス感覚も働きます。迷いを悪く見すぎず、選択肢を整理する年として読みます。

支合破:
  short: 結びつきとひび割れが同時に起こり、こだわりを調整する必要がある。
  detail: |-
    支合破は、支合の結びつきと破のひび割れが同時に出る複合位相です。強く結びつこうとする一方で、これまでの形に亀裂が入り、自分で壊しながら調和を探すような構造になります。
    支合だけの安定でも、破だけの亀裂でもありません。こだわりを持ちながら、そのこだわりをどう修正するかを見る年です。
  positions:
    day:
      short: 家庭や私生活で親密さと亀裂が同時に出やすく、関係の結び直しがテーマになりやすい。
      detail: |-
        日支の支合破は、家庭や私生活で結びつきたい気持ちと、今の形を変えたい動きが同時に出る年です。親密さを求めるほど、小さな亀裂や違和感も見えやすくなります。
        争って切るより、こだわりをほどいて結び直すことが鍵です。生活の形を少し変え、関係を再調整する年として読みます。
    month:
      short: 心では強いこだわりと違和感が同時に出やすく、気持ちの調整が必要になりやすい。
      detail: |-
        月支の支合破は、心がひとつのものへ結びつきながら、その対象に違和感や亀裂も感じる年です。好き嫌いや信念が強い分、気持ちの修正も必要になります。
        好きだからこそ壊したくなる、こだわるからこそ変えたくなる、という複雑さがあります。心を固定せず、調整の余地を残します。
    year:
      short: 仕事や社会で結びついたものを見直す動きが出やすく、協力関係の調整が必要になりやすい。
      detail: |-
        年支の支合破は、仕事や社会で結びついた関係や役割に見直しが入る年です。好きな仕事や協力関係に向かう一方で、やり方の亀裂や不調和も出やすくなります。
        関係を捨てる年ではなく、結びつきを保ちながら壊すべきこだわりを壊す年です。契約、チーム、役割の再調整を見ます。

冲刑:
  short: 分断と争いが同時に出やすく、方向転換に強い主張が重なる。
  detail: |-
    冲刑は、冲の分断・方向転換と、刑の争い・調整が重なる複合位相です。流れが変わるだけでなく、そこに強い主張や対立が加わります。
    変化を冷静に受け入れれば調整力になりますが、自制が効かないと、方向転換の場面が争いとして表面化します。
  positions:
    day:
      short: 家庭や私生活の変化に争いが重なりやすく、身近な関係の扱いに注意が必要。
      detail: |-
        日支の冲刑は、家庭や私生活の変化に争いが重なる年です。生活環境の変更、家族関係の見直し、離別や転居のようなテーマに、自己主張や衝突が加わりやすくなります。
        変化そのものより、変化の扱い方で争いが生まれます。近い関係ほど感情的になりやすいため、分けるものと調整するものを整理します。
    month:
      short: 心の方向転換に葛藤が重なり、焦りや尖った判断が出やすい。
      detail: |-
        月支の冲刑は、心の分断と内的な戦いが同時に出る年です。考え方が変わるだけでなく、その変化をめぐって焦りや苛立ちが強くなります。
        自分の中で争っているものを外へぶつけないことが大切です。迷いを言語化し、決断を急がないようにします。
    year:
      short: 仕事や社会で流れが変わる局面に争いが重なりやすく、衝突を避ける工夫が必要。
      detail: |-
        年支の冲刑は、仕事や社会の方向転換に争いが重なる年です。転職、役割変更、組織の変化などに、自分や周囲の強い主張が絡みやすくなります。
        衝突を通して新しい方向が見えることもありますが、強引に進めると対立が深まります。交渉、距離感、段階的な変更を重視します。

刑破:
  short: 争いとひび割れが同時に出やすく、調整しながら新しい形へ移る。
  detail: |-
    刑破は、刑の争い・主張と、破のひび割れ・修復が重なる複合位相です。亀裂が入った場所に自己主張や葛藤が加わるため、感情的に扱うとこじれやすくなります。
    うまく使えば、問題点をはっきりさせ、新しい形へ移行する力になります。壊すことより、修復の方向を見つけることが重要です。
  positions:
    day:
      short: 家庭や私生活の亀裂に自己主張が加わりやすく、身近な関係の修復がテーマになりやすい。
      detail: |-
        日支の刑破は、家庭や私生活に入った亀裂へ争いが加わりやすい年です。小さな違和感を放置すると、身近な関係で主張がぶつかることがあります。
        亀裂を広げる前に、何を直せば生活が整うのかを見ます。模様替えやルール変更のような小さな修復から始めると扱いやすくなります。
    month:
      short: 心のひび割れに葛藤が重なり、気持ちを急に決めすぎない注意が必要。
      detail: |-
        月支の刑破は、心の違和感に苛立ちや葛藤が重なる年です。ストレスから新しい考え方が生まれる可能性もありますが、焦って結論を出すと争いに寄りやすくなります。
        気持ちが破れている部分を責めるより、何を修復し、何を変えるかを落ち着いて整理します。
    year:
      short: 仕事上の亀裂に主張や争いが重なりやすく、やり方の見直しを冷静に進める年です。
      detail: |-
        年支の刑破は、仕事や社会面の亀裂に自己主張や対立が加わる年です。やり方の破綻、チーム内の違和感、制度や役割の見直しが争いを伴いやすくなります。
        新しい方向へ移る力もありますが、主張だけで押すと関係が壊れます。改革と調整を分けて考えます。

害刑:
  short: 受け入れる現実と争いが重なり、環境改善のための調整が必要。
  detail: |-
    害刑は、害の受け入れざるを得ない現実と、刑の争い・調整が重なる複合位相です。悪環境や不本意な状況に気づき、それを改善しようとして戦いが生まれることがあります。
    受け身で抱え込むだけでも、争いで押し切るだけでも扱いにくい位相です。問題点を見つけ、環境改善のために冷静に調整する年として読みます。
  positions:
    day:
      short: 家庭や私生活で受け入れざるを得ない問題と争いが重なりやすく、環境改善を慎重に進めます。
      detail: |-
        日支の害刑は、家庭や私生活で不本意な現実を受け入れながら、それを変えたい気持ちも強くなる年です。家族、健康、生活環境の問題が争いに発展しやすくなります。
        ただ我慢するだけでは病みやすく、ただ戦うだけでは関係が荒れます。問題点を具体化し、改善できる範囲から整えることが大切です。
    month:
      short: 心に入り込む負担と内的な戦いが重なり、ストレスを争いに変えない注意が必要。
      detail: |-
        月支の害刑は、心に入り込む負担と内的葛藤が重なる年です。相手や環境の欠点が見えやすく、批判的になったり、悩みが争いへ変わったりしやすくなります。
        鋭い気づきは環境改善に使えますが、言葉が強くなりすぎると対人面に出ます。気づきを攻撃ではなく調整に変える年です。
    year:
      short: 仕事や社会で受け身の負担と争いが重なりやすく、問題点を見つけて調整する年です。
      detail: |-
        年支の害刑は、仕事や社会で不本意な負担を引き受けつつ、改善のための争いも起こりやすい年です。悪い環境、古い仕組み、間違った方向性を打破したくなります。
        環境改善の力はありますが、争いが激しくなることもあります。相手の欠点を責めるより、仕組みや役割の調整に意識を向けます。

合刑破:
  short: 結びつき、争い、ひび割れが同時に出る複合的な位相。
  detail: |-
    合刑破は、支合の結びつき、刑の争い、破のひび割れが同時に出る複合位相です。思い通りの現実を作りたい力が強い一方で、不調和や争い、自分で壊そうとする反作用も出ます。
    単純な吉凶ではなく、こだわりを保ちながら、壊すべきものを壊し、複雑な調和を探る年です。主星と場所を分けて、どこで矛盾が起きているかを見ます。
  positions:
    day:
      short: 家庭や私生活で親密さ、主張、亀裂が同時に出やすく、関係を複雑に調整する必要があります。
      detail: |-
        日支の合刑破は、家庭や私生活で「まとまりたい」「主張したい」「変えたい」が同時に出る年です。身近な関係ほど複雑になり、親密さと争い、修復と破壊が混在します。
        ひとつの答えに急がず、何を守り、何を譲り、何を変えるかを分けて考えます。生活上のこだわりを柔らかく調整することが必要です。
    month:
      short: 心の中でこだわり、葛藤、違和感が同時に強まりやすく、単純に決めつけない姿勢が必要。
      detail: |-
        月支の合刑破は、心の中で結びつきたい対象、争いたい気持ち、違和感が同時に動く年です。好き嫌い、苛立ち、修正したい思いが混ざり、判断が複雑になります。
        気持ちを一つにまとめようとするほど苦しくなる場合があります。いったん分けて整理し、矛盾を抱えたまま調整する姿勢が必要です。
    year:
      short: 仕事や社会で協力、争い、見直しが同時に起こりやすく、こだわりを壊しながら調和を探る年です。
      detail: |-
        年支の合刑破は、仕事や社会面で協力関係、争い、やり方の見直しが同時に起こりやすい年です。強く結びつこうとする一方で、周囲との不調和やルールの亀裂も見えます。
        チーム、契約、役割、仕事の方法を複雑に調整する必要があります。単純に進めるより、こだわりを一部壊して現実に合う形へ整えます。
